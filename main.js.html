<script>
  window.APP_BOOTSTRAP = <?!= JSON.stringify(getAppBootstrap()); ?>;

  var appState = {
    currentUser: window.APP_BOOTSTRAP.currentUser || {},
    customers: [],
    users: [],
    products: [],
    salesOrderItems: [],
    adminOrderItems: [],
    approvals: [],
    approvers: [],
    approverSearch: '',
    approverPriceSearch: '',
    readyOrders: [],
    deliveryOrders: [],
    deliveryFilterDate: '',
    tomorrowOrders: [],
    tomorrowPlanDate: '',
    sessionUserId: '',
    currentDeliveryVerificationNoSo: ''
  };
  var APP_USER_STORAGE_KEY = 'airtis_sales_user_id';

  document.addEventListener('DOMContentLoaded', function() {
    try {
      bindEvents();
      setTodayAsDefault_();
      initializeApp_();
    } catch (error) {
      setStatusText_('Gagal inisialisasi');
      renderResult_('Gagal inisialisasi halaman: ' + error.message, true);
    }
  });

  function initializeApp_() {
    var savedUserId = loadSavedUserSession_();

    applyCurrentUserAccess_();
    setStatusText_('Silakan login');
    renderUnauthorizedState_();

    if (savedUserId) {
      setFieldValue_('login_user_id', savedUserId);
      renderUnauthorizedMessage_('Masukkan User ID lalu klik Masuk untuk memakai webapp.');
    }
  }

  function bindEvents() {
    document.querySelectorAll('.tab-btn').forEach(function(button) {
      button.addEventListener('click', function() {
        activateTab_(button.dataset.tab);
      });
    });
    document.querySelectorAll('.admin-subtab-btn').forEach(function(button) {
      button.addEventListener('click', function() {
        activateAdminView_(button.dataset.adminView);
      });
    });
    document.querySelectorAll('.approver-subtab-btn').forEach(function(button) {
      button.addEventListener('click', function() {
        activateApproverView_(button.dataset.approverView);
      });
    });

    document.getElementById('sales_id').addEventListener('change', handleSalesChange_);
    document.getElementById('customer_id').addEventListener('change', handleCustomerChange_);
    document.getElementById('customer_search').addEventListener('input', handleCustomerSearchInput_);
    document.getElementById('item').addEventListener('change', handleProductChange_);
    document.querySelectorAll('input[name="jenis_customer"]').forEach(function(input) {
      input.addEventListener('change', handleJenisCustomerChange_);
    });
    document.getElementById('qty').addEventListener('input', calculateTotals_);
    document.getElementById('harga').addEventListener('input', calculateTotals_);
    document.getElementById('diskon').addEventListener('input', calculateTotals_);
    document.getElementById('addSalesItemBtn').addEventListener('click', addSalesItem_);
    document.getElementById('resetBtn').addEventListener('click', resetForm_);
    document.getElementById('salesOrderForm').addEventListener('submit', submitForm_);
    document.getElementById('loginForm').addEventListener('submit', submitLoginForm_);
    document.getElementById('logoutBtn').addEventListener('click', handleLogout_);
    document.getElementById('refreshApproverBtn').addEventListener('click', loadApproverData_);
    document.getElementById('approver_search').addEventListener('input', handleApproverSearchInput_);
    document.getElementById('approver_price_search').addEventListener('input', handleApproverPriceSearchInput_);
    document.getElementById('refreshAdminBtn').addEventListener('click', loadAdminData_);
    document.getElementById('deliveryFilterDate').addEventListener('change', handleDeliveryFilterChange_);
    document.getElementById('deliveryFilterTodayBtn').addEventListener('click', handleDeliveryFilterToday_);
    document.getElementById('deliveryFilterAllBtn').addEventListener('click', handleDeliveryFilterAll_);
    document.getElementById('admin_customer_id').addEventListener('change', handleAdminCustomerChange_);
    document.getElementById('admin_item').addEventListener('change', handleAdminProductChange_);
    document.querySelectorAll('input[name="admin_jenis_customer"]').forEach(function(input) {
      input.addEventListener('change', handleAdminJenisCustomerChange_);
    });
    document.getElementById('admin_qty').addEventListener('input', calculateAdminTotals_);
    document.getElementById('admin_harga').addEventListener('input', calculateAdminTotals_);
    document.getElementById('admin_diskon').addEventListener('input', calculateAdminTotals_);
    document.getElementById('addAdminItemBtn').addEventListener('click', addAdminItem_);
    document.getElementById('resetAgentBtn').addEventListener('click', resetAgentForm_);
    document.getElementById('agentOrderForm').addEventListener('submit', submitAgentOrderForm_);
    document.getElementById('openAgentModalBtn').addEventListener('click', openAgentModal_);
    document.getElementById('closeAgentModalBtn').addEventListener('click', closeAgentModal_);
    document.getElementById('closeDeliveryVerificationBtn').addEventListener('click', closeDeliveryVerificationModal_);
    document.getElementById('cancelDeliveryVerificationBtn').addEventListener('click', closeDeliveryVerificationModal_);
    document.getElementById('saveDeliveryVerificationBtn').addEventListener('click', saveDeliveryVerification_);
    document.getElementById('generateTomorrowPlanBtn').addEventListener('click', handleGenerateTomorrowPlan_);
    document.getElementById('copyTomorrowPlanBtn').addEventListener('click', handleCopyTomorrowPlan_);
    document.getElementById('agentModalBackdrop').addEventListener('click', function(event) {
      if (event.target.id === 'agentModalBackdrop') {
        closeAgentModal_();
      }
    });
    document.getElementById('deliveryVerificationBackdrop').addEventListener('click', function(event) {
      if (event.target.id === 'deliveryVerificationBackdrop') {
        closeDeliveryVerificationModal_();
      }
    });
  }

  function loadAllData_() {
    if (currentUserHasRole_('sales')) {
      loadSalesData_(function() {
        setStatusText_('Data aplikasi siap dipakai');
      });
      return;
    }

    if (currentUserHasRole_('approver')) {
      loadApproverData_(function() {
        setStatusText_('Data aplikasi siap dipakai');
      });
      return;
    }

    if (currentUserHasRole_('cs_admin')) {
      loadAdminData_(function() {
        setStatusText_('Data aplikasi siap dipakai');
      });
      return;
    }

    setStatusText_('Role belum didukung');
    renderResult_('Role user belum dikenali oleh webapp.', true);
  }

  function loadSalesData_(callback) {
    if (!ensureAuthorizedSession_()) return;

    google.script.run
      .withSuccessHandler(function(data) {
        try {
          var payload = data || {};

          appState.customers = Array.isArray(payload.customers) ? payload.customers : [];
          appState.users = Array.isArray(payload.users) ? payload.users : [];
          appState.products = Array.isArray(payload.products) ? payload.products : [];
          syncCurrentUser_(payload.currentUser);

          renderSalesOptions_();
          renderCustomerOptions_();
          renderProductOptions_();
          renderSalesOrderItems_();
          handleSalesChange_();
          handleCustomerChange_();
          handleProductChange_();

          if (callback) callback();
        } catch (error) {
          setStatusText_('Gagal render data sales');
          renderResult_('Gagal render data sales: ' + error.message, true);
        }
      })
      .withFailureHandler(function(error) {
        setStatusText_('Gagal memuat data sales');
        renderResult_('Gagal memuat data sales: ' + error.message, true);
      })
      .getSalesOrderFormData(appState.currentUser.user_id);
  }

  function loadApproverData_(callback) {
    if (!ensureAuthorizedSession_()) return;

    google.script.run
      .withSuccessHandler(function(data) {
        try {
          var payload = data || {};

          appState.approvals = Array.isArray(payload.approvals) ? payload.approvals : [];
          appState.approvers = Array.isArray(payload.approvers) ? payload.approvers : [];
          appState.products = Array.isArray(payload.products) ? payload.products : appState.products;
          appState.approverSearch = '';
          appState.approverPriceSearch = '';
          syncCurrentUser_(payload.currentUser);

          renderApproverOptions_();
          renderApproverPriceSummary_();
          renderApproverPriceTable_();
          renderApproverSummary_();
          setFieldValue_('approver_search', '');
          setFieldValue_('approver_price_search', '');
          renderApproverTable_();

          if (callback) callback();
        } catch (error) {
          setStatusText_('Gagal render data approval');
          renderResult_('Gagal render data approval: ' + error.message, true);
        }
      })
      .withFailureHandler(function(error) {
        setStatusText_('Gagal memuat data approval');
        renderResult_('Gagal memuat data approval: ' + error.message, true);
      })
      .getApproverDashboardData(appState.currentUser.user_id);
  }

  function loadAdminData_(callback) {
    if (!ensureAuthorizedSession_()) return;

    google.script.run
      .withSuccessHandler(function(data) {
        try {
          var payload = data || {};

          appState.readyOrders = Array.isArray(payload.readyOrders) ? payload.readyOrders : [];
          appState.deliveryOrders = Array.isArray(payload.deliveryOrders) ? payload.deliveryOrders : [];
          appState.tomorrowOrders = Array.isArray(payload.tomorrowOrders) ? payload.tomorrowOrders : [];
          appState.tomorrowPlanDate = String(payload.tomorrowPlanDate || '');
          appState.customers = Array.isArray(payload.customers) ? payload.customers : appState.customers;
          appState.products = Array.isArray(payload.products) ? payload.products : appState.products;
          syncCurrentUser_(payload.currentUser);
          ensureDeliveryFilterDate_();

          renderAdminCustomerOptions_();
          renderAdminProductOptions_();
          renderAdminOrderItems_();
          handleAdminCustomerChange_();
          handleAdminProductChange_();
          renderAdminSummary_();
          renderTomorrowPlanSummary_();
          renderTomorrowPlanTable_();
          resetTomorrowPlanOutput_();
          renderReadyOrderTable_();
          renderDeliveryTable_();

          if (callback) callback();
        } catch (error) {
          var message = 'Gagal render data admin: ' + (error && error.message ? error.message : error);
          setStatusText_(message);
          renderResult_(message, true);
        }
      })
      .withFailureHandler(function(error) {
        var message = 'Gagal memuat data admin: ' + error.message;
        setStatusText_(message);
        renderResult_(message, true);
      })
      .getAdminDashboardData(appState.currentUser.user_id);
  }

  function activateTab_(tabName) {
    if (!canAccessTab_(tabName)) {
      return;
    }

    document.querySelectorAll('.tab-btn').forEach(function(button) {
      button.classList.toggle('active', button.dataset.tab === tabName);
    });

    document.querySelectorAll('.tab-panel').forEach(function(panel) {
      panel.classList.toggle('active', panel.id === 'tab-' + tabName);
    });
  }

  function renderSalesOptions_() {
    var salesSelect = document.getElementById('sales_id');
    salesSelect.innerHTML = '<option value="">Pilih sales</option>';

    appState.users.forEach(function(user) {
      var option = document.createElement('option');
      option.value = user.user_id;
      option.textContent = user.nama_user + ' (' + user.user_id + ')';
      option.dataset.nama = user.nama_user;
      salesSelect.appendChild(option);
    });

    if (appState.currentUser && appState.currentUser.user_id) {
      salesSelect.value = appState.currentUser.user_id;
    }

    salesSelect.disabled = true;
  }

  function renderCustomerOptions_() {
    var customerSelect = document.getElementById('customer_id');
    customerSelect.innerHTML = '<option value="">Pilih customer lama</option>';

    getSortedCustomersByName_(appState.customers).forEach(function(customer) {
      var option = document.createElement('option');
      option.value = customer.kode_customer;
      option.textContent = customer.nama_customer + ' (' + customer.kode_customer + ')';
      customerSelect.appendChild(option);
    });

    renderSalesCustomerSearchResults_(getFieldValue_('customer_search'));
  }

  function renderAdminCustomerOptions_() {
    var customerSelect = document.getElementById('admin_customer_id');
    customerSelect.innerHTML = '<option value="">Pilih agen / customer</option>';

    getSortedCustomersByName_(appState.customers).forEach(function(customer) {
      var option = document.createElement('option');
      option.value = customer.kode_customer;
      option.textContent = customer.nama_customer + ' (' + customer.kode_customer + ')';
      customerSelect.appendChild(option);
    });
  }

  function renderProductOptions_() {
    var productSelect = document.getElementById('item');
    productSelect.innerHTML = '<option value="">Pilih produk</option>';

    appState.products.forEach(function(product) {
      var option = document.createElement('option');
      option.value = product.nama_item;
      option.textContent = product.nama_item;
      option.dataset.harga = product.harga_default || 0;
      option.dataset.basePrice = product.harga_dasar || product.harga_default || 0;
      productSelect.appendChild(option);
    });
  }

  function renderAdminProductOptions_() {
    var productSelect = document.getElementById('admin_item');
    productSelect.innerHTML = '<option value="">Pilih produk</option>';

    appState.products.forEach(function(product) {
      var option = document.createElement('option');
      option.value = product.nama_item;
      option.textContent = product.nama_item;
      option.dataset.harga = product.harga_default || 0;
      option.dataset.basePrice = product.harga_dasar || product.harga_default || 0;
      productSelect.appendChild(option);
    });
  }

  function renderApproverOptions_() {
    var approverSelect = document.getElementById('approver_id');
    approverSelect.innerHTML = '<option value="">Pilih approver</option>';

    appState.approvers.forEach(function(user) {
      var option = document.createElement('option');
      option.value = user.user_id;
      option.textContent = user.nama_user + ' (' + user.user_id + ')';
      approverSelect.appendChild(option);
    });

    if (appState.currentUser && appState.currentUser.user_id) {
      approverSelect.value = appState.currentUser.user_id;
    }

    approverSelect.disabled = true;
  }

  function renderApproverTable_() {
    var tbody = document.getElementById('approverTableBody');
    var approvals;
    if (!tbody) return;

    if (!appState.approvals.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-cell">Belum ada data approval.</td></tr>';
      return;
    }

    approvals = getFilteredApprovals_();

    if (!approvals.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-cell">Approval tidak ditemukan. Coba kata kunci lain.</td></tr>';
      return;
    }

    tbody.innerHTML = approvals.map(function(row) {
      var noSo = String(row.no_so || '');

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(noSo) + '</td>' +
          '<td>' + buildApproverCustomerCellHtml_(row) + '</td>' +
          '<td>' + buildApproverOrderCellHtml_(row) + '</td>' +
          '<td>' + buildApproverRiskSummary_(row) + '</td>' +
          '<td>' + buildApproverActionsHtml_(noSo) + '</td>' +
        '</tr>';
    }).join('');
  }

  function renderApproverSummary_() {
    var approvals = appState.approvals || [];

    setText_('summaryApprovalPending', String(approvals.length || 0));
    setText_('summaryApprovalHeld', String(approvals.filter(function(row) {
      return normalizeClientText_(row.status_customer) === 'ditahan';
    }).length));
    setText_('summaryApprovalOverdue', String(approvals.filter(function(row) {
      return Number(row.total_tunggakan || 0) > 0 ||
        Number(row.jumlah_nota_overdue || 0) > 0 ||
        String(row.tanggal_jatuh_tempo_terdekat || '').trim() !== '';
    }).length));
  }

  function renderApproverPriceSummary_() {
    var products = appState.products || [];
    var readyCount = products.filter(function(product) {
      return Number(product.harga_dasar || product.harga_default || 0) > 0;
    }).length;

    setText_('summaryBasePriceItems', String(products.length || 0));
    setText_('summaryBasePriceReady', String(readyCount));
    setText_('summaryBasePriceMissing', String((products.length || 0) - readyCount));
  }

  function renderApproverPriceTable_() {
    var tbody = document.getElementById('approverPriceTableBody');
    var products;

    if (!tbody) return;

    products = getFilteredApproverProducts_();

    if (!products.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">Item tidak ditemukan.</td></tr>';
      return;
    }

    tbody.innerHTML = products.map(function(product) {
      var kodeItem = String(product.kode_item || '');
      var hargaDasar = Number(product.harga_dasar || product.harga_default || 0);
      var updateMeta = [];

      if (product.diupdate_oleh) {
        updateMeta.push('Oleh ' + product.diupdate_oleh);
      }

      if (product.tanggal_update_harga) {
        updateMeta.push(String(product.tanggal_update_harga));
      }

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(kodeItem) + '</td>' +
          '<td>' + escapeHtml_(product.nama_item || '-') + '</td>' +
          '<td>' + escapeHtml_(product.satuan || '-') + '</td>' +
          '<td><div class="price-input-wrap">' +
            '<span class="price-input-prefix">Rp</span>' +
            '<input class="price-base-input" id="base-price-' + escapeHtml_(kodeItem) + '" type="number" min="0" step="1" value="' + escapeHtml_(String(hargaDasar || 0)) + '" />' +
          '</div></td>' +
          '<td><div class="price-update-meta">' + escapeHtml_(updateMeta.join(' | ') || 'Belum pernah diupdate') + '</div></td>' +
          '<td><button type="button" class="primary-btn" onclick="saveProductBasePrice_(\'' + escapeJs_(kodeItem) + '\')">Simpan</button></td>' +
        '</tr>';
    }).join('');
  }

  function getFilteredApprovals_() {
    var query = normalizeSearchText_(appState.approverSearch);

    return (appState.approvals || []).slice().sort(compareApprovalsByPriority_).filter(function(row) {
      var haystack;

      if (!query) {
        return true;
      }

      haystack = [
        row.no_so,
        row.customer,
        row.sales_nama,
        row.diajukan_oleh,
        row.item,
        row.alasan_approval,
        row.status_customer
      ].map(normalizeSearchText_).join(' ');

      return haystack.indexOf(query) !== -1;
    });
  }

  function getFilteredApproverProducts_() {
    var query = normalizeSearchText_(appState.approverPriceSearch);

    return (appState.products || []).slice().sort(function(left, right) {
      return normalizeSearchText_(left.nama_item).localeCompare(normalizeSearchText_(right.nama_item), 'id-ID');
    }).filter(function(product) {
      var haystack;

      if (!query) {
        return true;
      }

      haystack = [
        product.kode_item,
        product.nama_item,
        product.satuan
      ].map(normalizeSearchText_).join(' ');

      return haystack.indexOf(query) !== -1;
    });
  }

  function compareApprovalsByPriority_(left, right) {
    return getApprovalPriorityScore_(right) - getApprovalPriorityScore_(left);
  }

  function getApprovalPriorityScore_(row) {
    var score = 0;

    if (normalizeClientText_(row.status_customer) === 'ditahan') {
      score += 10000;
    }

    if (normalizeClientText_(row.status_pembayaran_customer) === 'ditahan') {
      score += 6000;
    }

    score += Number(row.jumlah_nota_overdue || 0) * 100;
    score += Math.floor(Number(row.total_tunggakan || 0) / 100000);

    if (String(row.tanggal_jatuh_tempo_terdekat || '').trim()) {
      score += 25;
    }

    return score;
  }

  function buildApproverCustomerCellHtml_(row) {
    var metaLines = [];

    if (row.sales_nama) {
      metaLines.push('<div class="approver-meta-line"><strong>Sales Order:</strong> ' + escapeHtml_(row.sales_nama) + '</div>');
    }

    if (row.diajukan_oleh) {
      metaLines.push('<div class="approver-meta-line"><strong>Diajukan Oleh:</strong> ' + escapeHtml_(row.diajukan_oleh) + '</div>');
    }

    if (row.tanggal_pengajuan) {
      metaLines.push('<div class="approver-meta-line"><strong>Tanggal:</strong> ' + escapeHtml_(row.tanggal_pengajuan) + '</div>');
    }

    return '' +
      '<div class="approver-customer-cell">' +
        '<strong>' + escapeHtml_(row.customer || '-') + '</strong>' +
        '<div class="approver-meta">' + metaLines.join('') + '</div>' +
      '</div>';
  }

  function buildApproverOrderCellHtml_(row) {
    return '' +
      '<div class="approver-order-cell">' +
        buildOrderDetailCellHtml_(row) +
        '<div class="approver-order-total"><strong>Total:</strong> Rp ' + escapeHtml_(formatNumber_(row.total || 0)) + '</div>' +
      '</div>';
  }

  function buildApproverRiskSummary_(row) {
    var lines = [];
    var badges = [];
    var alasanApproval = String(row.alasan_approval || '').trim();
    var statusCustomer = normalizeClientText_(row.status_customer);
    var statusPembayaran = String(row.status_pembayaran_customer || '').trim();
    var jumlahNota = Number(row.jumlah_nota_overdue || 0);
    var totalTunggakan = Number(row.total_tunggakan || 0);
    var jatuhTempo = String(row.tanggal_jatuh_tempo_terdekat || '').trim();
    var catatan = String(row.catatan_piutang || '').trim();

    if (statusPembayaran) {
      badges.push(buildPaymentBadge_(statusPembayaran));
    }

    if (String(row.status_customer || '').trim()) {
      badges.push(buildStatusBadge_(row.status_customer));
    }

    if (statusCustomer === 'ditahan') {
      lines.push('Status customer ditahan');
    }

    if (jumlahNota > 0) {
      lines.push('Customer menunggak ' + jumlahNota + ' nota');
    }

    if (totalTunggakan > 0) {
      lines.push('Total tunggakan Rp ' + formatNumber_(totalTunggakan));
    }

    if (jatuhTempo) {
      lines.push('JT terdekat ' + jatuhTempo);
    }

    if (alasanApproval && !isDuplicateApprovalReason_(alasanApproval, lines)) {
      lines.push(alasanApproval);
    }

    if (catatan) {
      lines.push('Catatan piutang: ' + catatan);
    }

    if (!lines.length) {
      lines.push('Perlu persetujuan manual');
    }

    return '' +
      '<div class="approver-risk-cell">' +
        (badges.length ? '<div class="inline-actions approver-risk-badges">' + badges.join('') + '</div>' : '') +
        '<div class="risk-summary">' + lines.map(function(line) {
          return '<div class="risk-line">- ' + escapeHtml_(line) + '</div>';
        }).join('') + '</div>' +
      '</div>';
  }

  function buildApproverActionsHtml_(noSo) {
    return '' +
      '<div class="approver-action-stack">' +
        '<input class="mini-input approver-note-input" id="approval-note-' + escapeHtml_(noSo) + '" type="text" placeholder="Catatan keputusan wajib" />' +
        '<div class="inline-actions">' +
          '<button type="button" class="approve-btn" onclick="handleApproveOrder(\'' + escapeJs_(noSo) + '\')">Approve</button>' +
          '<button type="button" class="danger-btn" onclick="handleRejectOrder(\'' + escapeJs_(noSo) + '\')">Reject</button>' +
        '</div>' +
      '</div>';
  }

  function isDuplicateApprovalReason_(reason, existingLines) {
    var normalizedReason = normalizeSearchText_(reason);

    return (existingLines || []).some(function(line) {
      return normalizeSearchText_(line).indexOf(normalizedReason) !== -1 ||
        normalizedReason.indexOf(normalizeSearchText_(line)) !== -1;
    });
  }

  function renderReadyOrderTable_() {
    var tbody = document.getElementById('readyOrderTableBody');
    if (!tbody) return;

    if (!appState.readyOrders.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-cell">Belum ada order siap kirim.</td></tr>';
      return;
    }

    tbody.innerHTML = appState.readyOrders.map(function(row) {
      var noSo = String(row.no_so || '');

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(noSo) + '</td>' +
          '<td>' + escapeHtml_(row.nama_customer_input) + '</td>' +
          '<td>' + buildOrderItemSummaryHtml_(row) + '</td>' +
          '<td>' + escapeHtml_(getOrderQtyLabel_(row)) + '</td>' +
          '<td>' + buildStatusBadge_(row.status_order) + '</td>' +
          '<td>' + formatNumber_(row.total_order || row.total) + '</td>' +
          '<td><div class="inline-actions">' +
            '<button type="button" class="approve-btn" onclick="handleCreateSuratJalan(\'' + escapeJs_(noSo) + '\')">Buat SJ</button>' +
          '</div></td>' +
        '</tr>';
    }).join('');
  }

  function renderDeliveryTable_() {
    var tbody = document.getElementById('deliveryTableBody');
    var filteredOrders;
    var activeDateLabel;
    if (!tbody) return;

    if (!appState.deliveryOrders.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">Belum ada surat jalan.</td></tr>';
      return;
    }

    filteredOrders = getFilteredDeliveryOrders_();
    activeDateLabel = appState.deliveryFilterDate ? formatLongDateId_(appState.deliveryFilterDate) : '';

    if (!filteredOrders.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">' +
        escapeHtml_(activeDateLabel ? ('Belum ada surat jalan untuk tanggal ' + activeDateLabel + '.') : 'Belum ada surat jalan.') +
      '</td></tr>';
      return;
    }

    tbody.innerHTML = filteredOrders.map(function(row) {
      var noSo = String(row.no_so || '');
      var actions = [];
      var statusVerifikasi = String(row.status_verifikasi_cs || 'Belum Dicek');

      if (String(row.status_kirim || '') === 'Siap Kirim') {
        actions.push('<button type="button" class="approve-btn" onclick="handleMarkDelivered(\'' + escapeJs_(noSo) + '\')">Terkirim</button>');
      }

  function handleVerificationLineInput_(index) {
    var qty = Number(getFieldValue_('verify-qty-' + index) || 0);
    var harga = Number(getFieldValue_('verify-harga-' + index) || 0);
    var diskon = Number(getFieldValue_('verify-diskon-' + index) || 0);
    var subtotal = (qty * harga) - diskon;

    setFieldValue_('verify-subtotal-' + index, formatCurrencyInput_(subtotal > 0 ? subtotal : 0));
    updateDeliveryVerificationTotals_();
  }

  function updateDeliveryVerificationTotals_() {
    var order = getDeliveryOrderByNoSo_(appState.currentDeliveryVerificationNoSo);
    var details = Array.isArray(order && order.details) ? order.details : [];
    var totals = details.reduce(function(result, _, index) {
      var qty = Number(getFieldValue_('verify-qty-' + index) || 0);
      var harga = Number(getFieldValue_('verify-harga-' + index) || 0);
      var diskon = Number(getFieldValue_('verify-diskon-' + index) || 0);
      var subtotal = Math.max((qty * harga) - diskon, 0);

      result.subtotal += qty * harga;
      result.diskon += diskon;
      result.total += subtotal;
      return result;
    }, {
      subtotal: 0,
      diskon: 0,
      total: 0
    });

    setFieldValue_('verificationSubtotalFinal', formatCurrencyInput_(totals.subtotal));
    setFieldValue_('verificationDiskonFinal', formatCurrencyInput_(totals.diskon));
    setFieldValue_('verificationTotalFinal', formatCurrencyInput_(totals.total));
  }

  function collectDeliveryVerificationPayload_() {
    var order = getDeliveryOrderByNoSo_(appState.currentDeliveryVerificationNoSo);
    var details = Array.isArray(order && order.details) ? order.details : [];
    var items = details.map(function(detail, index) {
      var qtyTerkirim = Number(getFieldValue_('verify-qty-' + index) || 0);
      var hargaFinal = Number(getFieldValue_('verify-harga-' + index) || 0);
      var diskonFinal = Number(getFieldValue_('verify-diskon-' + index) || 0);
      var subtotalFinal = Math.max((qtyTerkirim * hargaFinal) - diskonFinal, 0);

      return {
        detail_id: detail.detail_id || '',
        qty_terkirim: qtyTerkirim,
        harga_final: hargaFinal,
        diskon_final: diskonFinal,
        subtotal_final: subtotalFinal
      };
    });

    return {
      no_so: appState.currentDeliveryVerificationNoSo,
      items: items,
      catatan_verifikasi_cs: getFieldValue_('verificationNote')
    };
  }

  function calculateTotals_() {
    var qty = Number(getFieldValue_('qty') || 0);
    var harga = Number(getFieldValue_('harga') || 0);
    var diskonPersen = clampDiscountPercent_(getFieldValue_('diskon'));
    var subtotal = qty * harga;
    var diskonNominal = subtotal * (diskonPersen / 100);
    var total = subtotal - diskonNominal;

    setFieldValue_('line_subtotal', formatCurrencyInput_(total > 0 ? total : 0));
  }

  function calculateSalesOrderTotals_() {
    var totals = appState.salesOrderItems.reduce(function(result, item) {
      result.subtotal += Number(item.qty || 0) * Number(item.harga || 0);
      result.diskon += Number(item.diskon || 0);
      result.total += Number(item.subtotal || 0);
      return result;
    }, {
      subtotal: 0,
      diskon: 0,
      total: 0
    });

  function collectSalesItemDraft_() {
    calculateTotals_();

    var namaItem = String(getFieldValue_('item') || '').trim();
    var qty = Number(getFieldValue_('qty') || 0);
    var harga = Number(getFieldValue_('harga') || 0);
    var diskonPersen = clampDiscountPercent_(getFieldValue_('diskon'));
    var grossSubtotal = qty * harga;
    var diskon = grossSubtotal * (diskonPersen / 100);
    var subtotal = parseCurrencyInput_(getFieldValue_('line_subtotal'));
    var product = getProductByName_(namaItem);
    var hargaDasar = Number(product && (product.harga_dasar || product.harga_default) || 0);

    if (!namaItem) {
      return { validationMessage: 'Produk wajib dipilih sebelum menambah item.' };
    }

    if (!product) {
      return { validationMessage: 'Produk tidak ditemukan di master item.' };
    }

    if (hargaDasar <= 0) {
      return { validationMessage: 'Harga dasar produk belum diinput approver. Hubungi approver untuk melengkapi harga dasar item.' };
    }

    if (qty <= 0) {
      return { validationMessage: 'Qty item harus lebih dari 0.' };
    }

    if (harga < 0) {
      return { validationMessage: 'Harga item tidak boleh negatif.' };
    }

    if (diskonPersen < 0) {
      return { validationMessage: 'Diskon item tidak boleh negatif.' };
    }

    if (diskonPersen > 100) {
      return { validationMessage: 'Diskon item maksimal 100%.' };
    }

    return {
      validationMessage: '',
      item: {
        kode_item: product ? product.kode_item || '' : '',
        nama_item: namaItem,
        qty: qty,
        satuan: product ? product.satuan || '' : '',
        harga: harga,
        harga_dasar: hargaDasar,
        diskon: diskon,
        diskon_persen: diskonPersen,
        butuh_persetujuan_harga: harga < hargaDasar,
        subtotal: subtotal
      }
    };
  }

  function validateAgentFormPayload_(payload) {
    if (!Array.isArray(payload.items) || !payload.items.length) {
      return 'Minimal satu item order agen wajib ditambahkan.';
    }

    if (!String(payload.tanggal_jatuh_tempo || '').trim()) {
      return 'Tanggal Jatuh Tempo wajib diisi.';
    }

    if (String(payload.jenis_customer || '') !== 'Baru') {
      return '';
    }

    if (!String(payload.nama_customer_input || '').trim()) {
      return 'Nama Agen / Customer wajib diisi untuk agen baru.';
    }

    if (!String(payload.pic_customer || '').trim()) {
      return 'PIC Customer wajib diisi untuk agen baru.';
    }

    if (!String(payload.alamat_kirim || '').trim()) {
      return 'Alamat Kirim wajib diisi untuk agen baru.';
    }

    if (!String(payload.no_hp_customer || '').trim()) {
      return 'No. HP Customer wajib diisi untuk agen baru.';
    }

    return '';
  }

  function validateSalesFormPayload_(payload) {
    var requiredNewCustomerFields;

    if (!Array.isArray(payload.items) || !payload.items.length) {
      return 'Minimal satu item order wajib ditambahkan.';
    }

    if (!String(payload.tanggal_jatuh_tempo || '').trim()) {
      return 'Tanggal Jatuh Tempo wajib diisi.';
    }

    if (String(payload.jenis_customer || '') !== 'Baru') {
      return '';
    }

    requiredNewCustomerFields = [
      { key: 'nama_customer_input', label: 'Nama Customer' },
      { key: 'pic_customer', label: 'PIC Customer' },
      { key: 'alamat_kirim', label: 'Alamat Kirim' },
      { key: 'no_hp_customer', label: 'No. HP Customer' },
      { key: 'link_google_maps', label: 'Link Google Maps' }
    ];

    for (var i = 0; i < requiredNewCustomerFields.length; i += 1) {
      if (!String(payload[requiredNewCustomerFields[i].key] || '').trim()) {
        return requiredNewCustomerFields[i].label + ' wajib diisi untuk customer baru.';
      }
    }

    return '';
  }

  function renderSubmitResult_(result) {
    var isWarning = result.butuh_persetujuan === 'Ya';
    var lines = [
      'No. SO: ' + result.no_so,
      'ID Customer: ' + (result.customer_id || '-'),
      'Jumlah Item: ' + String(result.jumlah_item || 0),
      'Status Order: ' + result.status_order,
      'Tanggal Jatuh Tempo: ' + (result.tanggal_jatuh_tempo || '-'),
      'Butuh Persetujuan: ' + result.butuh_persetujuan
    ];

    if (result.alasan_hold) {
      lines.push('Alasan Hold: ' + result.alasan_hold);
    }

    renderResult_(lines.join('\n'), isWarning);
  }

  function applyCurrentUserAccess_() {
    var currentUser = appState.currentUser || {};
    var roleKey = currentUser.role_key || '';
    var summary = 'Belum login';

    if (currentUser.authorized) {
      summary = (currentUser.nama_user || currentUser.user_id || '-') + ' | ' + (currentUser.role || '-') + ' | ' + (currentUser.user_id || '-');
    }

    setText_('userSummary', summary);
    document.getElementById('logoutBtn').classList.toggle('hidden', !currentUser.authorized);
    document.getElementById('authNotice').classList.toggle('hidden', !!currentUser.authorized);

    document.querySelectorAll('.tab-btn').forEach(function(button) {
      var allowed = button.dataset.role === roleKey;
      button.classList.toggle('hidden', !allowed);
      button.disabled = !allowed;
    });

    document.querySelectorAll('.tab-panel').forEach(function(panel) {
      panel.classList.toggle('hidden', panel.dataset.role !== roleKey);
      panel.classList.remove('active');
    });

    if (currentUser.authorized) {
      if (roleKey === 'cs_admin') {
        activateAdminView_('operations');
      }
      if (roleKey === 'approver') {
        activateApproverView_('approval');
      }
      activateTab_(roleKey === 'cs_admin' ? 'admin' : roleKey);
    }
  }

  function renderUnauthorizedState_() {
    applyCurrentUserAccess_();
    document.getElementById('authNotice').classList.remove('hidden');
    setFieldValue_('login_user_id', appState.currentUser && appState.currentUser.user_id ? appState.currentUser.user_id : loadSavedUserSession_());
    renderUnauthorizedMessage_(
      'Masukkan User ID yang terdaftar aktif di MASTER_USER untuk memakai webapp.'
    );
    document.querySelectorAll('.tab-btn').forEach(function(button) {
      button.classList.add('hidden');
    });
    document.querySelectorAll('.tab-panel').forEach(function(panel) {
      panel.classList.remove('active');
      panel.classList.add('hidden');
    });
  }

  function renderUnauthorizedMessage_(message) {
    setText_('authNoticeText', message);
  }

  function ensureAuthorizedSession_() {
    if (appState.currentUser && appState.currentUser.authorized && appState.currentUser.user_id) {
      return true;
    }

    setStatusText_('Silakan login ulang');
    renderUnauthorizedState_();
    return false;
  }

  function saveUserSession_(userId) {
    var normalizedUserId = String(userId || '').trim().toUpperCase();

    appState.sessionUserId = normalizedUserId;

    try {
      localStorage.setItem(APP_USER_STORAGE_KEY, normalizedUserId);
    } catch (error) {
      // Browser mobile tertentu kadang membatasi storage untuk halaman Apps Script.
    }
  }

  function loadSavedUserSession_() {
    var userId = '';

    try {
      userId = String(localStorage.getItem(APP_USER_STORAGE_KEY) || '').trim().toUpperCase();
    } catch (error) {
      userId = '';
    }

    return userId || String(appState.sessionUserId || '').trim().toUpperCase();
  }

  function clearSavedUserSession_() {
    appState.sessionUserId = '';

    try {
      localStorage.removeItem(APP_USER_STORAGE_KEY);
    } catch (error) {
      // Abaikan jika browser tidak mengizinkan storage.

  function renderSalesCustomerSearchResults_(query) {
    var container = document.getElementById('customerSearchResults');

    if (!container) return;

    if (!normalizedQuery) {
      container.innerHTML = '<div class="customer-search-empty">Ketik minimal 2 huruf untuk mencari customer lama.</div>';
      return;
    }

    if (normalizedQuery.length < 2) {
      container.innerHTML = '<div class="customer-search-empty">Lanjutkan ketik minimal 2 huruf agar hasil customer muncul.</div>';
      return;
    }

    filteredCustomers = filterCustomersByQuery_(query).slice(0, 10);

      container.innerHTML = '<div class="customer-search-empty">Customer tidak ditemukan. Coba ketik nama, kode customer, PIC, atau no. HP.</div>';
      return;

    container.innerHTML = filteredCustomers.map(function(customer) {

  function filterCustomersByQuery_(query) {

    return getSortedCustomersByName_(appState.customers).filter(function(customer) {

        customer.kode_customer,
        customer.pic,
        customer.no_hp

      if (!normalizedQuery) {

      return haystack.indexOf(normalizedQuery) !== -1;

  function extractAreaLabel_(alamat) {
    var text = String(alamat || '').trim();
    var keywordMatch;

    if (!text) {
      return '-';
    }

    if (text.indexOf(',') !== -1) {
      var parts = text.split(',').map(function(part) {
        return String(part || '').trim();
      }).filter(Boolean);

      if (parts.length > 1) {
        return parts[parts.length - 1];
      }
    }

    keywordMatch = text.match(/(serang baru|cikarang|bekasi|karawang|tangerang|bogor|depok|bandung|jakarta|serang)/i);
    if (keywordMatch) {
      return toTitleCaseWords_(keywordMatch[0]);
    }

    return text;
  }

  function toTitleCaseWords_(text) {
    return String(text || '').replace(/\b\w+/g, function(part) {
      return part.charAt(0).toUpperCase() + part.slice(1).toLowerCase();
    });
  }

  function normalizeClientText_(value) {

  function escapeHtml_(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');

  function escapeJs_(value) {

      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'");

    if (number > 100) {

  function formatCustomerMoney_(value) {

  function buildTomorrowPlanMessage_() {

  function buildTomorrowItemSummary_(orders) {
    var grouped = {};

    (orders || []).forEach(function(row) {
      getOrderDetails_(row).forEach(function(detail) {
        var key = String(detail.nama_item || '').trim();
        var unit = String(detail.satuan || getProductUnitByName_(detail.nama_item)).trim();

        if (!key) {
          return;
        }

        if (!grouped[key]) {
          grouped[key] = {
            qty: 0,
            unit: unit
          };
        }

        grouped[key].qty += Number(detail.qty || 0);
      });
    });

    return Object.keys(grouped).map(function(itemName) {
      var item = grouped[itemName];
      var qtyLabel = formatNumber_(item.qty);
      return '- ' + itemName + ': ' + qtyLabel + (item.unit ? ' ' + item.unit : '');
    });
  }

  function formatLongDateId_(value) {
    var normalizedValue = normalizeDateKey_(value);
    var parts = normalizedValue.split('-');
    var monthNames = [
      'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
      'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
    ];
    var year = Number(parts[0] || 0);
    var monthIndex = Number(parts[1] || 0) - 1;
    var day = Number(parts[2] || 0);

    if (!year || monthIndex < 0 || monthIndex > 11 || !day) {
      return String(value || '-');
    }

    return day + ' ' + monthNames[monthIndex] + ' ' + year;
  }

  function formatShortDateId_(value) {
    var normalizedValue = normalizeDateKey_(value);
    var parts = normalizedValue.split('-');
    var monthNames = [
      'Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun',
      'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'
    ];
    var year = Number(parts[0] || 0);
    var monthIndex = Number(parts[1] || 0) - 1;
    var day = Number(parts[2] || 0);

    if (!year || monthIndex < 0 || monthIndex > 11 || !day) {
      return String(value || '-');
    }

    return String(day).padStart(2, '0') + ' ' + monthNames[monthIndex] + ' ' + year;
  }

  function normalizeDateKey_(value) {
    var match = String(value || '').trim().match(/^(\d{4})-(\d{2})-(\d{2})/);

    if (!match) {
      return '';
    }

    return [match[1], match[2], match[3]].join('-');
  }

  function getTodayIsoDate_() {

    ].join('-');
  }

  function copyTextToClipboard_(text, onSuccess, onFailure) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(onSuccess).catch(onFailure);
      return;
    }

    var tempArea = document.createElement('textarea');
    tempArea.value = text;
    tempArea.setAttribute('readonly', 'readonly');
    tempArea.style.position = 'fixed';
    tempArea.style.top = '-9999px';
    document.body.appendChild(tempArea);
    tempArea.focus();
    tempArea.select();

    try {
      document.execCommand('copy');
      document.body.removeChild(tempArea);
      onSuccess();
    } catch (error) {
      document.body.removeChild(tempArea);
      onFailure(error);
    }
  }

          '.section-header{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #222;padding:0.06in 0 0.08in;}' +
          '.company-block{display:flex;align-items:flex-start;gap:0.1in;}' +
          '.company-logo{width:0.78in;height:auto;object-fit:contain;flex:0 0 auto;}' +
          '.company-text{min-width:0;}' +
          '.company{font-weight:700;font-size:0.22in;line-height:1.1;}' +
          '.meta-line{font-size:0.12in;line-height:1.15;margin-top:0.03in;}' +
          '.doc-title{text-align:right;font-weight:700;}' +
          '.doc-title .title{font-size:0.26in;line-height:1;}' +
          '.doc-title .number{font-size:0.22in;margin-top:0.04in;}' +
          '.fields{margin-top:0.11in;display:grid;grid-template-columns:1fr 1fr;gap:0.06in 0.26in;}' +
          '.field{display:grid;grid-template-columns:1.05in 0.14in 1fr;font-size:0.12in;align-items:baseline;}' +
          '.field .label{font-weight:700;}' +
          '.full-row{margin-top:0.08in;font-size:0.12in;}' +
          '.full-row .label{font-weight:700;display:inline-block;width:1.05in;}' +
          '.box-line{border:1px solid #222;min-height:0.3in;padding:0.05in 0.07in;white-space:pre-line;font-size:0.12in;line-height:1.2;}' +
          '.section-title{font-weight:700;font-size:0.14in;margin:0.12in 0 0.07in;}' +
          'table{width:100%;border-collapse:collapse;font-size:0.12in;table-layout:fixed;}' +
          'th,td{border:1px solid #222;padding:0.05in 0.06in;vertical-align:top;}' +
          'th{font-weight:700;text-align:center;}' +
          '.center{text-align:center;}' +
          '.right{text-align:right;}' +
          '.notes-box{border:1px solid #222;padding:0.05in 0.07in;min-height:0.29in;font-size:0.12in;line-height:1.2;}' +
          '.signatures{display:grid;grid-template-columns:repeat(4,1fr);gap:0.16in;margin-top:0.14in;}' +
          '.sig{text-align:center;font-size:0.12in;font-weight:700;}' +
          '.sig .line{border-top:1px solid #222;margin-bottom:0.06in;height:0.48in;}' +
          '.perforation{position:relative;text-align:center;font-size:0.12in;font-weight:700;margin:0.09in 0 0.08in;border-top:3px dashed #222;}' +
          '.perforation span{position:relative;top:-0.09in;background:transparent;padding:0 0.08in;}' +
          '.split-grid{display:grid;grid-template-columns:62% 38%;gap:0.12in;}' +
          '.summary table td:first-child{font-weight:700;}' +
          '.summary .grand td{font-weight:700;}' +
          '.tight td{height:0.26in;}' +
          '.note-title{font-weight:700;margin-bottom:0.04in;}' +
          '@media print{body{background:#fff}.sheet{margin:0 auto;page-break-inside:avoid;}}' +
        '</style>' +
      '</head>' +
      '<body onload="window.print()">' +
        printBodyHtml +
      '</body>' +
      '</html>';
  }

  function buildCombinedPrintSheet_(data) {
    return '' +
      '<div class="sheet">' +
        '<div class="print-area">' +
          buildSuratJalanSection_(data) +
          '<div class="perforation"><span> </span></div>' +
          buildNotaSection_(data) +
        '</div>' +
      '</div>';
  }

  function buildSuratJalanSection_(data) {
    var detailRows = buildPrintSuratJalanRows_(data.items);

    return '' +
      '<section>' +
        buildPrintHeader_('SURAT JALAN', data.no_surat_jalan || '-') +
        '<div class="fields">' +
          buildPrintField_('TANGGAL', formatPrintDate_(data.tanggal_kirim || data.tanggal_cetak || '')) +
          buildPrintField_('NO SJ', data.no_surat_jalan || '-') +
          buildPrintField_('NO SO', data.no_so || '-') +
          buildPrintField_('NO NOTA', buildPrintNotaNumber_(data)) +
          buildPrintField_('CUSTOMER', data.nama_customer || '-') +
          buildPrintField_('PIC / HP', joinPrintValues_(data.pic_customer, data.no_hp_customer, ' / ') || '-') +
        '</div>' +
        '<div class="full-row"><span class="label">ALAMAT</span>: </div>' +
        '<div class="box-line">' + escapeHtml_(data.alamat_kirim || '-') + '</div>' +
        '<div class="section-title">DETAIL BARANG</div>' +
        '<table class="tight">' +
          '<thead>' +
            '<tr><th style="width:6%">NO</th><th>DESKRIPSI BARANG</th><th style="width:10%">QTY</th><th style="width:10%">SAT</th><th style="width:19%">KET.</th></tr>' +
          '</thead>' +
          '<tbody>' + detailRows + '</tbody>' +
        '</table>' +
        '<div class="section-title">CATATAN OPERASIONAL</div>' +
        '<div class="notes-box">' + buildPrintHtmlLines_(buildSuratJalanNotes_(data) || '-') + '</div>' +
        '<div class="signatures">' +
          buildPrintSignatureBox_('DIBUAT') +
          buildPrintSignatureBox_('DRIVER') +
          buildPrintSignatureBox_('GUDANG') +
          buildPrintSignatureBox_('PENERIMA') +
        '</div>' +
      '</section>';
  }

  function buildNotaSection_(data) {
    var detailRows = buildPrintNotaRows_(data.items);
    var subtotal = getPrintSubtotal_(data);
    var diskon = getPrintDiskon_(data);
    var total = Number(data.total || 0);

    return '' +
      '<section>' +
        buildPrintHeader_('NOTA', buildPrintNotaNumber_(data), true) +
        '<div class="fields">' +
          buildPrintField_('TANGGAL', formatPrintDate_(data.tanggal_kirim || data.tanggal_cetak || '')) +
          buildPrintField_('NO SJ', data.no_surat_jalan || '-') +
          buildPrintField_('NO NOTA', buildPrintNotaNumber_(data)) +
          buildPrintField_('TERM', data.term_pembayaran || '-') +
          buildPrintField_('CUSTOMER', data.nama_customer || '-') +
          buildPrintField_('SALES', data.sales_nama || '-') +
        '</div>' +
        '<div class="full-row"><span class="label">ALAMAT</span>: </div>' +
        '<div class="box-line">' + escapeHtml_(data.alamat_kirim || '-') + '</div>' +
        '<table class="tight" style="margin-top:0.12in;">' +
          '<thead>' +
            '<tr><th style="width:5%">NO</th><th>BARANG</th><th style="width:10%">QTY</th><th style="width:9%">SAT</th><th style="width:13%">HARGA</th><th style="width:10%">DISC</th><th style="width:13%">JUMLAH</th></tr>' +
          '</thead>' +
          '<tbody>' + detailRows + '</tbody>' +
        '</table>' +
        '<div class="split-grid" style="margin-top:0.12in;">' +
          '<div>' +
            '<div class="notes-box" style="min-height:0.48in;">' +
              '<div class="note-title">CATATAN / TERBILANG</div>' +
              buildPrintNotaNotesHtml_(data, total) +
            '</div>' +
          '</div>' +
          '<div class="summary">' +
            '<table>' +
              '<tbody>' +
                '<tr><td colspan="2">RINGKASAN TAGIHAN</td></tr>' +
                '<tr><td>SUBTOTAL</td><td class="right">' + escapeHtml_(formatPrintMoneyPlain_(subtotal)) + '</td></tr>' +
                '<tr><td>DISKON</td><td class="right">' + escapeHtml_(formatPrintMoneyPlain_(diskon)) + '</td></tr>' +
                '<tr class="grand"><td>GRAND TOTAL</td><td class="right">' + escapeHtml_(formatPrintMoneyPlain_(total)) + '</td></tr>' +
              '</tbody>' +
            '</table>' +
          '</div>' +
        '</div>' +
        '<div class="signatures" style="margin-top:0.18in;">' +
          buildPrintSignatureBox_('DIBUAT') +
          buildPrintSignatureBox_('DISETUJUI') +
          buildPrintSignatureBox_('PELANGGAN') +
          buildPrintSignatureBox_('STEMPEL / PARAF') +
        '</div>' +
      '</section>';
  }

  function buildPrintSuratJalanRows_(items) {
    var details = getPrintableItems_(items);
    var rowsHtml = details.map(function(item, index) {
      return '' +
        '<tr>' +
          '<td class="center">' + escapeHtml_(String(index + 1)) + '</td>' +
          '<td>' + escapeHtml_(item.nama_item || '-') + '</td>' +
          '<td class="center">' + escapeHtml_(formatNumber_(item.qty || 0)) + '</td>' +
          '<td class="center">' + escapeHtml_(formatPrintUnit_(item.satuan || '-')) + '</td>' +
          '<td></td>' +
        '</tr>';
    }).join('');

    return rowsHtml;
  }

  function buildPrintNotaRows_(items) {
    var details = getPrintableItems_(items);
    var rowsHtml = details.map(function(item, index) {
      return '' +
        '<tr>' +
          '<td class="center">' + escapeHtml_(String(index + 1)) + '</td>' +
          '<td>' + escapeHtml_(item.nama_item || '-') + '</td>' +
          '<td class="center">' + escapeHtml_(formatNumber_(item.qty || 0)) + '</td>' +
          '<td class="center">' + escapeHtml_(formatPrintUnit_(item.satuan || '-')) + '</td>' +
          '<td class="right">' + escapeHtml_(formatPrintMoneyPlain_(item.harga || 0)) + '</td>' +
          '<td class="right">' + escapeHtml_(formatPrintMoneyPlain_(item.diskon || 0)) + '</td>' +
          '<td class="right">' + escapeHtml_(formatPrintMoneyPlain_(item.subtotal || 0)) + '</td>' +
        '</tr>';
    }).join('');

    return rowsHtml;
  }

  function buildPrintHeader_(title, number, compactTop) {
    return '' +
      '<div class="section-header"' + (compactTop ? ' style="padding-top:0;"' : '') + '>' +
        '<div class="company-block">' +
          '<img class="company-logo" alt="Logo PT Abuyamas Tirta Sejahtera" src="' + escapeHtml_(window.APP_BOOTSTRAP.brandLogoDataUrl || '') + '" />' +
          '<div class="company-text">' +
            '<div class="company">PT ABUYAMAS TIRTA SEJAHTERA</div>' +
            '<div class="meta-line">JL. KAPLING BLOK EO NO.31 RT.01 RW.09, CIJUJUNG, SUKARAJA, BOGOR</div>' +
            '<div class="meta-line">TELP 081217002021  EMAIL airtismarketingats@gmail.com</div>' +
          '</div>' +
        '</div>' +
        '<div class="doc-title">' +
          '<div class="title">' + escapeHtml_(title || '-') + '</div>' +
          '<div class="number">' + escapeHtml_(number || '-') + '</div>' +
        '</div>' +
      '</div>';
  }

  function buildPrintField_(label, value) {
    return '' +
      '<div class="field">' +
        '<div class="label">' + escapeHtml_(label || '-') + '</div>' +
        '<div>:</div>' +
        '<div>' + escapeHtml_(value || '-') + '</div>' +
      '</div>';
  }

  function buildPrintSignatureBox_(label) {
    return '' +
      '<div class="sig">' +
        '<div class="line"></div>' + escapeHtml_(label || '-') +
      '</div>';
  }

  function getPrintableItems_(items) {
    return Array.isArray(items) && items.length ? items.slice() : [{
      nama_item: '',
      qty: '',
      satuan: '',
      harga: 0,
      diskon: 0,
      subtotal: 0
    }];
  }

  function getPrintSubtotal_(data) {
    if (Number(data.subtotal || 0) > 0) {
      return Number(data.subtotal || 0);
    }

    return getPrintableItems_(data.items).reduce(function(result, item) {
      return result + (Number(item.qty || 0) * Number(item.harga || 0));
    }, 0);
  }

  function getPrintDiskon_(data) {
    if (Number(data.diskon || 0) > 0) {
      return Number(data.diskon || 0);
    }

    return getPrintableItems_(data.items).reduce(function(result, item) {
      return result + Number(item.diskon || 0);
    }, 0);
  }

  function buildSuratJalanNotes_(data) {
    var notes = [];
    var picHp = joinPrintValues_(data.pic_customer, data.no_hp_customer, ' / ');

    if (picHp) {
      notes.push('PIC : ' + picHp);
    }

    if (data.catatan_order) {
      notes.push('ORDER : ' + data.catatan_order);
    }

    if (data.catatan_kirim) {
      notes.push('KIRIM : ' + data.catatan_kirim);
    }

    return notes.join('\n');
  }

  function formatPrintDate_(value) {
    var text = String(value || '').trim();
    var match = text.match(/^(\d{4})-(\d{2})-(\d{2})/);

    if (!match) {
      return text || '-';
    }

    return match[3] + '/' + match[2] + '/' + match[1];
  }

  function buildTerbilangRupiah_(value) {
    var amount = Math.floor(Number(value || 0));

    if (amount <= 0) {
      return 'Nol rupiah';
    }

    return toTitleCaseWords_(numberToBahasaWords_(amount).trim()) + ' rupiah';
  }

  function numberToBahasaWords_(value) {
    var angka = ['', 'satu', 'dua', 'tiga', 'empat', 'lima', 'enam', 'tujuh', 'delapan', 'sembilan', 'sepuluh', 'sebelas'];

    value = Math.floor(Number(value || 0));

    if (value < 12) {
      return angka[value];
    }

    if (value < 20) {
      return numberToBahasaWords_(value - 10) + ' belas';
    }

    if (value < 100) {
      return numberToBahasaWords_(Math.floor(value / 10)) + ' puluh ' + numberToBahasaWords_(value % 10);
    }

    if (value < 200) {
      return 'seratus ' + numberToBahasaWords_(value - 100);
    }

    if (value < 1000) {
      return numberToBahasaWords_(Math.floor(value / 100)) + ' ratus ' + numberToBahasaWords_(value % 100);
    }

    if (value < 2000) {
      return 'seribu ' + numberToBahasaWords_(value - 1000);
    }

    if (value < 1000000) {
      return numberToBahasaWords_(Math.floor(value / 1000)) + ' ribu ' + numberToBahasaWords_(value % 1000);
    }

    if (value < 1000000000) {
      return numberToBahasaWords_(Math.floor(value / 1000000)) + ' juta ' + numberToBahasaWords_(value % 1000000);
    }

    return String(value);
  }

  function joinPrintValues_(firstValue, secondValue, separator) {
    var values = [firstValue, secondValue].filter(function(value) {
      return String(value || '').trim() !== '';
    });

    return values.join(separator || ' ');
  }

  function buildPrintNotaNumber_(data) {
    var noSo = String(data && data.no_so ? data.no_so : '').trim();

    if (!noSo) {
      return '-';
    }

    return noSo.replace(/^SO/i, 'NT');
  }

  function formatPrintUnit_(value) {
    return String(value || '-').trim().toUpperCase() || '-';
  }

  function formatPrintMoneyPlain_(value) {
    return formatNumber_(Number(value || 0));
  }

  function buildPrintHtmlLines_(text) {
    return escapeHtml_(text || '-').replace(/\n/g, '<br>');
  }

  function buildPrintNotaNotesHtml_(data, total) {
    var notes = [];
    var orderNotes = joinPrintValues_(data.catatan_order, data.catatan_kirim, ' | ');

    notes.push('- PERIKSA BARANG SAAT DITERIMA.');
    notes.push('- PEMBAYARAN MENGIKUTI TERM YANG DISEPAKATI.');

    if (orderNotes) {
      notes.push('- CATATAN: ' + orderNotes);
    }

    return buildPrintHtmlLines_(notes.join('\n')) + ' &nbsp;&nbsp; <strong>' +
      escapeHtml_(buildTerbilangRupiah_(total).toUpperCase()) +
    '</strong>';
  }
</script>
