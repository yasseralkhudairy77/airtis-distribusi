<script>
  window.APP_BOOTSTRAP = <?!= JSON.stringify(getAppBootstrap()); ?>;

  var appState = {
    currentUser: window.APP_BOOTSTRAP.currentUser || {},
    customers: [],
    users: [],
    products: [],
    salesOrderItems: [],
    adminOrderItems: [],
    approvals: [],
    approvers: [],
    readyOrders: [],
    deliveryOrders: [],
    deliveryFilterDate: '',
    tomorrowOrders: [],
    tomorrowPlanDate: '',
    sessionUserId: ''
  };
  var APP_USER_STORAGE_KEY = 'airtis_sales_user_id';

  document.addEventListener('DOMContentLoaded', function() {
    try {
      bindEvents();
      setTodayAsDefault_();
      initializeApp_();
    } catch (error) {
      setStatusText_('Gagal inisialisasi');
      renderResult_('Gagal inisialisasi halaman: ' + error.message, true);
    }
  });

  function initializeApp_() {
    var savedUserId = loadSavedUserSession_();

    applyCurrentUserAccess_();
    setStatusText_('Silakan login');
    renderUnauthorizedState_();

    if (savedUserId) {
      setFieldValue_('login_user_id', savedUserId);
      renderUnauthorizedMessage_('Masukkan User ID lalu klik Masuk untuk memakai webapp.');
    }
  }

  function bindEvents() {
    document.querySelectorAll('.tab-btn').forEach(function(button) {
      button.addEventListener('click', function() {
        activateTab_(button.dataset.tab);
      });
    });
    document.querySelectorAll('.admin-subtab-btn').forEach(function(button) {
      button.addEventListener('click', function() {
        activateAdminView_(button.dataset.adminView);
      });
    });

    document.getElementById('sales_id').addEventListener('change', handleSalesChange_);
    document.getElementById('customer_id').addEventListener('change', handleCustomerChange_);
    document.getElementById('item').addEventListener('change', handleProductChange_);
    document.querySelectorAll('input[name="jenis_customer"]').forEach(function(input) {
      input.addEventListener('change', handleJenisCustomerChange_);
    });
    document.getElementById('qty').addEventListener('input', calculateTotals_);
    document.getElementById('harga').addEventListener('input', calculateTotals_);
    document.getElementById('diskon').addEventListener('input', calculateTotals_);
    document.getElementById('addSalesItemBtn').addEventListener('click', addSalesItem_);
    document.getElementById('resetBtn').addEventListener('click', resetForm_);
    document.getElementById('salesOrderForm').addEventListener('submit', submitForm_);
    document.getElementById('loginForm').addEventListener('submit', submitLoginForm_);
    document.getElementById('logoutBtn').addEventListener('click', handleLogout_);
    document.getElementById('refreshApproverBtn').addEventListener('click', loadApproverData_);
    document.getElementById('refreshAdminBtn').addEventListener('click', loadAdminData_);
    document.getElementById('deliveryFilterDate').addEventListener('change', handleDeliveryFilterChange_);
    document.getElementById('deliveryFilterTodayBtn').addEventListener('click', handleDeliveryFilterToday_);
    document.getElementById('deliveryFilterAllBtn').addEventListener('click', handleDeliveryFilterAll_);
    document.getElementById('admin_customer_id').addEventListener('change', handleAdminCustomerChange_);
    document.getElementById('admin_item').addEventListener('change', handleAdminProductChange_);
    document.querySelectorAll('input[name="admin_jenis_customer"]').forEach(function(input) {
      input.addEventListener('change', handleAdminJenisCustomerChange_);
    });
    document.getElementById('admin_qty').addEventListener('input', calculateAdminTotals_);
    document.getElementById('admin_harga').addEventListener('input', calculateAdminTotals_);
    document.getElementById('admin_diskon').addEventListener('input', calculateAdminTotals_);
    document.getElementById('addAdminItemBtn').addEventListener('click', addAdminItem_);
    document.getElementById('resetAgentBtn').addEventListener('click', resetAgentForm_);
    document.getElementById('agentOrderForm').addEventListener('submit', submitAgentOrderForm_);
    document.getElementById('openAgentModalBtn').addEventListener('click', openAgentModal_);
    document.getElementById('closeAgentModalBtn').addEventListener('click', closeAgentModal_);
    document.getElementById('generateTomorrowPlanBtn').addEventListener('click', handleGenerateTomorrowPlan_);
    document.getElementById('copyTomorrowPlanBtn').addEventListener('click', handleCopyTomorrowPlan_);
    document.getElementById('agentModalBackdrop').addEventListener('click', function(event) {
      if (event.target.id === 'agentModalBackdrop') {
        closeAgentModal_();
      }
    });
  }

  function loadAllData_() {
    if (currentUserHasRole_('sales')) {
      loadSalesData_(function() {
        setStatusText_('Data aplikasi siap dipakai');
      });
      return;
    }

    if (currentUserHasRole_('approver')) {
      loadApproverData_(function() {
        setStatusText_('Data aplikasi siap dipakai');
      });
      return;
    }

    if (currentUserHasRole_('cs_admin')) {
      loadAdminData_(function() {
        setStatusText_('Data aplikasi siap dipakai');
      });
      return;
    }

    setStatusText_('Role belum didukung');
    renderResult_('Role user belum dikenali oleh webapp.', true);
  }

  function loadSalesData_(callback) {
    if (!ensureAuthorizedSession_()) return;

    google.script.run
      .withSuccessHandler(function(data) {
        try {
          var payload = data || {};

          appState.customers = Array.isArray(payload.customers) ? payload.customers : [];
          appState.users = Array.isArray(payload.users) ? payload.users : [];
          appState.products = Array.isArray(payload.products) ? payload.products : [];
          syncCurrentUser_(payload.currentUser);

          renderSalesOptions_();
          renderCustomerOptions_();
          renderProductOptions_();
          renderSalesOrderItems_();
          handleSalesChange_();
          handleCustomerChange_();
          handleProductChange_();

          if (callback) callback();
        } catch (error) {
          setStatusText_('Gagal render data sales');
          renderResult_('Gagal render data sales: ' + error.message, true);
        }
      })
      .withFailureHandler(function(error) {
        setStatusText_('Gagal memuat data sales');
        renderResult_('Gagal memuat data sales: ' + error.message, true);
      })
      .getSalesOrderFormData(appState.currentUser.user_id);
  }

  function loadApproverData_(callback) {
    if (!ensureAuthorizedSession_()) return;

    google.script.run
      .withSuccessHandler(function(data) {
        try {
          var payload = data || {};

          appState.approvals = Array.isArray(payload.approvals) ? payload.approvals : [];
          appState.approvers = Array.isArray(payload.approvers) ? payload.approvers : [];
          syncCurrentUser_(payload.currentUser);

          renderApproverOptions_();
          renderApproverTable_();

          if (callback) callback();
        } catch (error) {
          setStatusText_('Gagal render data approval');
          renderResult_('Gagal render data approval: ' + error.message, true);
        }
      })
      .withFailureHandler(function(error) {
        setStatusText_('Gagal memuat data approval');
        renderResult_('Gagal memuat data approval: ' + error.message, true);
      })
      .getApproverDashboardData(appState.currentUser.user_id);
  }

  function loadAdminData_(callback) {
    if (!ensureAuthorizedSession_()) return;

    google.script.run
      .withSuccessHandler(function(data) {
        try {
          var payload = data || {};

          appState.readyOrders = Array.isArray(payload.readyOrders) ? payload.readyOrders : [];
          appState.deliveryOrders = Array.isArray(payload.deliveryOrders) ? payload.deliveryOrders : [];
          appState.tomorrowOrders = Array.isArray(payload.tomorrowOrders) ? payload.tomorrowOrders : [];
          appState.tomorrowPlanDate = String(payload.tomorrowPlanDate || '');
          appState.customers = Array.isArray(payload.customers) ? payload.customers : appState.customers;
          appState.products = Array.isArray(payload.products) ? payload.products : appState.products;
          syncCurrentUser_(payload.currentUser);
          ensureDeliveryFilterDate_();

          renderAdminCustomerOptions_();
          renderAdminProductOptions_();
          renderAdminOrderItems_();
          handleAdminCustomerChange_();
          handleAdminProductChange_();
          renderAdminSummary_();
          renderTomorrowPlanSummary_();
          renderTomorrowPlanTable_();
          resetTomorrowPlanOutput_();
          renderReadyOrderTable_();
          renderDeliveryTable_();

          if (callback) callback();
        } catch (error) {
          var message = 'Gagal render data admin: ' + (error && error.message ? error.message : error);
          setStatusText_(message);
          renderResult_(message, true);
        }
      })
      .withFailureHandler(function(error) {
        var message = 'Gagal memuat data admin: ' + error.message;
        setStatusText_(message);
        renderResult_(message, true);
      })
      .getAdminDashboardData(appState.currentUser.user_id);
  }

  function activateTab_(tabName) {
    if (!canAccessTab_(tabName)) {
      return;
    }

    document.querySelectorAll('.tab-btn').forEach(function(button) {
      button.classList.toggle('active', button.dataset.tab === tabName);
    });

    document.querySelectorAll('.tab-panel').forEach(function(panel) {
      panel.classList.toggle('active', panel.id === 'tab-' + tabName);
    });
  }

  function renderSalesOptions_() {
    var salesSelect = document.getElementById('sales_id');
    salesSelect.innerHTML = '<option value="">Pilih sales</option>';

    appState.users.forEach(function(user) {
      var option = document.createElement('option');
      option.value = user.user_id;
      option.textContent = user.nama_user + ' (' + user.user_id + ')';
      option.dataset.nama = user.nama_user;
      salesSelect.appendChild(option);
    });

    if (appState.currentUser && appState.currentUser.user_id) {
      salesSelect.value = appState.currentUser.user_id;
    }

    salesSelect.disabled = true;
  }

  function renderCustomerOptions_() {
    var customerSelect = document.getElementById('customer_id');
    customerSelect.innerHTML = '<option value="">Pilih customer lama</option>';

    appState.customers.forEach(function(customer) {
      var option = document.createElement('option');
      option.value = customer.kode_customer;
      option.textContent = customer.nama_customer + ' (' + customer.kode_customer + ')';
      customerSelect.appendChild(option);
    });
  }

  function renderAdminCustomerOptions_() {
    var customerSelect = document.getElementById('admin_customer_id');
    customerSelect.innerHTML = '<option value="">Pilih agen / customer</option>';

    appState.customers.forEach(function(customer) {
      var option = document.createElement('option');
      option.value = customer.kode_customer;
      option.textContent = customer.nama_customer + ' (' + customer.kode_customer + ')';
      customerSelect.appendChild(option);
    });
  }

  function renderProductOptions_() {
    var productSelect = document.getElementById('item');
    productSelect.innerHTML = '<option value="">Pilih produk</option>';

    appState.products.forEach(function(product) {
      var option = document.createElement('option');
      option.value = product.nama_item;
      option.textContent = product.nama_item;
      option.dataset.harga = product.harga_default || 0;
      productSelect.appendChild(option);
    });
  }

  function renderAdminProductOptions_() {
    var productSelect = document.getElementById('admin_item');
    productSelect.innerHTML = '<option value="">Pilih produk</option>';

    appState.products.forEach(function(product) {
      var option = document.createElement('option');
      option.value = product.nama_item;
      option.textContent = product.nama_item;
      option.dataset.harga = product.harga_default || 0;
      productSelect.appendChild(option);
    });
  }

  function renderApproverOptions_() {
    var approverSelect = document.getElementById('approver_id');
    approverSelect.innerHTML = '<option value="">Pilih approver</option>';

    appState.approvers.forEach(function(user) {
      var option = document.createElement('option');
      option.value = user.user_id;
      option.textContent = user.nama_user + ' (' + user.user_id + ')';
      approverSelect.appendChild(option);
    });

    if (appState.currentUser && appState.currentUser.user_id) {
      approverSelect.value = appState.currentUser.user_id;
    }

    approverSelect.disabled = true;
  }

  function renderApproverTable_() {
    var tbody = document.getElementById('approverTableBody');
    if (!tbody) return;

    if (!appState.approvals.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="empty-cell">Belum ada data approval.</td></tr>';
      return;
    }

    tbody.innerHTML = appState.approvals.map(function(row) {
      var noSo = String(row.no_so || '');
      var tunggakanHtml = buildApprovalRiskSummary_(row);

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(noSo) + '</td>' +
          '<td>' + escapeHtml_(row.customer) + '</td>' +
          '<td>' + buildOrderDetailCellHtml_(row) + '</td>' +
          '<td>' + buildPaymentBadge_(row.status_pembayaran_customer) + '</td>' +
          '<td>' + tunggakanHtml + '</td>' +
          '<td>' + formatNumber_(row.total) + '</td>' +
          '<td>' + escapeHtml_(row.alasan_approval) + '</td>' +
          '<td><div class="inline-actions">' +
            '<input class="mini-input" id="approval-note-' + escapeHtml_(noSo) + '" type="text" placeholder="Catatan wajib" />' +
            '<button type="button" class="approve-btn" onclick="handleApproveOrder(\'' + escapeJs_(noSo) + '\')">Approve</button>' +
            '<button type="button" class="danger-btn" onclick="handleRejectOrder(\'' + escapeJs_(noSo) + '\')">Reject</button>' +
          '</div></td>' +
        '</tr>';
    }).join('');
  }

  function renderReadyOrderTable_() {
    var tbody = document.getElementById('readyOrderTableBody');
    if (!tbody) return;

    if (!appState.readyOrders.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-cell">Belum ada order siap kirim.</td></tr>';
      return;
    }

    tbody.innerHTML = appState.readyOrders.map(function(row) {
      var noSo = String(row.no_so || '');

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(noSo) + '</td>' +
          '<td>' + escapeHtml_(row.nama_customer_input) + '</td>' +
          '<td>' + buildOrderItemSummaryHtml_(row) + '</td>' +
          '<td>' + escapeHtml_(getOrderQtyLabel_(row)) + '</td>' +
          '<td>' + buildStatusBadge_(row.status_order) + '</td>' +
          '<td>' + formatNumber_(row.total_order || row.total) + '</td>' +
          '<td><div class="inline-actions">' +
            '<button type="button" class="approve-btn" onclick="handleCreateSuratJalan(\'' + escapeJs_(noSo) + '\')">Buat SJ</button>' +
          '</div></td>' +
        '</tr>';
    }).join('');
  }

  function renderDeliveryTable_() {
    var tbody = document.getElementById('deliveryTableBody');
    var filteredOrders;
    var activeDateLabel;
    if (!tbody) return;

    if (!appState.deliveryOrders.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">Belum ada surat jalan.</td></tr>';
      return;
    }

    filteredOrders = getFilteredDeliveryOrders_();
    activeDateLabel = appState.deliveryFilterDate ? formatLongDateId_(appState.deliveryFilterDate) : '';

    if (!filteredOrders.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">' +
        escapeHtml_(activeDateLabel ? ('Belum ada surat jalan untuk tanggal ' + activeDateLabel + '.') : 'Belum ada surat jalan.') +
      '</td></tr>';
      return;
    }

    tbody.innerHTML = filteredOrders.map(function(row) {
      var noSo = String(row.no_so || '');
      var actions = [];

      if (String(row.status_kirim || '') === 'Siap Kirim') {
        actions.push('<button type="button" class="approve-btn" onclick="handleMarkDelivered(\'' + escapeJs_(noSo) + '\')">Terkirim</button>');
      }

      if (String(row.status_kirim || '') === 'Terkirim') {
        actions.push('<button type="button" class="ghost-btn" onclick="handleCompleteOrder(\'' + escapeJs_(noSo) + '\')">Selesai</button>');
      }

      actions.push('<button type="button" class="ghost-btn" onclick="handlePrintSuratJalan(\'' + escapeJs_(noSo) + '\')">Print</button>');

      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(row.no_surat_jalan) + '</td>' +
          '<td>' + escapeHtml_(formatShortDateId_(row.tanggal_kirim || row.tanggal_cetak || '')) + '</td>' +
          '<td>' + escapeHtml_(noSo) + '</td>' +
          '<td>' + escapeHtml_(row.nama_customer) + '</td>' +
          '<td>' + buildStatusBadge_(row.status_kirim) + '</td>' +
          '<td><div class="inline-actions">' + actions.join('') + '</div></td>' +
        '</tr>';
    }).join('');
  }

  function handleDeliveryFilterChange_() {
    appState.deliveryFilterDate = normalizeDateKey_(getFieldValue_('deliveryFilterDate'));
    renderDeliveryTable_();
  }

  function handleDeliveryFilterToday_() {
    appState.deliveryFilterDate = getTodayIsoDate_();
    setFieldValue_('deliveryFilterDate', appState.deliveryFilterDate);
    renderDeliveryTable_();
    setStatusText_('Filter surat jalan diatur ke hari ini');
  }

  function handleDeliveryFilterAll_() {
    appState.deliveryFilterDate = '';
    setFieldValue_('deliveryFilterDate', '');
    renderDeliveryTable_();
    setStatusText_('Menampilkan semua surat jalan');
  }

  function renderAdminSummary_() {
    setText_('summaryReadyOrders', String(appState.readyOrders.length || 0));
    setText_('summaryDeliveryReady', String(countDeliveryByStatus_('Siap Kirim')));
    setText_('summaryDelivered', String(countDeliveryByStatus_('Terkirim')));
    setText_('summaryCompleted', String(countDeliveryByStatus_('Selesai')));
  }

  function renderTomorrowPlanSummary_() {
    var outletMap = {};
    var itemMap = {};

    appState.tomorrowOrders.forEach(function(row) {
      outletMap[getTomorrowOutletKey_(row)] = true;
      getOrderDetails_(row).forEach(function(detail) {
        itemMap[String(detail.nama_item || '').trim()] = true;
      });
    });

    setText_('summaryTomorrowOutlets', String(countNonEmptyKeys_(outletMap)));
    setText_('summaryTomorrowOrders', String(appState.tomorrowOrders.length || 0));
    setText_('summaryTomorrowItems', String(countNonEmptyKeys_(itemMap)));
  }

  function renderTomorrowPlanTable_() {
    var tbody = document.getElementById('tomorrowPlanTableBody');
    if (!tbody) return;

    if (!appState.tomorrowOrders.length) {
      tbody.innerHTML = '<tr><td colspan="7" class="empty-cell">Belum ada rencana kirim untuk besok.</td></tr>';
      return;
    }

    tbody.innerHTML = appState.tomorrowOrders.map(function(row) {
      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(row.no_so) + '</td>' +
          '<td>' + escapeHtml_(row.nama_customer_input) + '</td>' +
          '<td>' + buildOrderItemSummaryHtml_(row) + '</td>' +
          '<td>' + escapeHtml_(buildTomorrowQtyLabel_(row)) + '</td>' +
          '<td>' + escapeHtml_(extractAreaLabel_(row.alamat_kirim)) + '</td>' +
          '<td>' + buildStatusBadge_(getTomorrowDisplayStatus_(row)) + '</td>' +
          '<td>' + escapeHtml_(row.sales_nama || '-') + '</td>' +
        '</tr>';
    }).join('');
  }

  function renderSalesOrderItems_() {
    var tbody = document.getElementById('salesOrderItemsTableBody');

    if (!tbody) return;

    if (!appState.salesOrderItems.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">Belum ada item di sales order.</td></tr>';
      calculateSalesOrderTotals_();
      return;
    }

    tbody.innerHTML = appState.salesOrderItems.map(function(item, index) {
      return '' +
        '<tr>' +
          '<td><div class="sales-item-meta">' +
            '<strong>' + escapeHtml_(item.nama_item) + '</strong>' +
            '<small>' + escapeHtml_(item.satuan || '-') + '</small>' +
          '</div></td>' +
          '<td>' + escapeHtml_(formatNumber_(item.qty)) + '</td>' +
          '<td>' + escapeHtml_(formatCurrencyInput_(item.harga)) + '</td>' +
          '<td>' + escapeHtml_(formatCurrencyInput_(item.diskon)) + '</td>' +
          '<td>' + escapeHtml_(formatCurrencyInput_(item.subtotal)) + '</td>' +
          '<td><button type="button" class="danger-btn" onclick="removeSalesItem_(' + index + ')">Hapus</button></td>' +
        '</tr>';
    }).join('');

    calculateSalesOrderTotals_();
  }

  function renderAdminOrderItems_() {
    var tbody = document.getElementById('adminOrderItemsTableBody');

    if (!tbody) return;

    if (!appState.adminOrderItems.length) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty-cell">Belum ada item di order agen.</td></tr>';
      calculateAdminOrderTotals_();
      return;
    }

    tbody.innerHTML = appState.adminOrderItems.map(function(item, index) {
      return '' +
        '<tr>' +
          '<td><div class="sales-item-meta">' +
            '<strong>' + escapeHtml_(item.nama_item) + '</strong>' +
            '<small>' + escapeHtml_(item.satuan || '-') + '</small>' +
          '</div></td>' +
          '<td>' + escapeHtml_(formatNumber_(item.qty)) + '</td>' +
          '<td>' + escapeHtml_(formatCurrencyInput_(item.harga)) + '</td>' +
          '<td>' + escapeHtml_(formatCurrencyInput_(item.diskon)) + '</td>' +
          '<td>' + escapeHtml_(formatCurrencyInput_(item.subtotal)) + '</td>' +
          '<td><button type="button" class="danger-btn" onclick="removeAdminItem_(' + index + ')">Hapus</button></td>' +
        '</tr>';
    }).join('');

    calculateAdminOrderTotals_();
  }

  function resetTomorrowPlanOutput_() {
    var output = document.getElementById('tomorrowPlanOutput');
    if (!output) return;

    output.value = '';
    document.getElementById('copyTomorrowPlanBtn').disabled = true;
  }

  function handleGenerateTomorrowPlan_() {
    var output = document.getElementById('tomorrowPlanOutput');
    if (!output) return;

    output.value = buildTomorrowPlanMessage_();
    document.getElementById('copyTomorrowPlanBtn').disabled = !String(output.value || '').trim();
    setStatusText_('Rekap rencana kirim besok berhasil dibuat');
  }

  function handleCopyTomorrowPlan_() {
    var output = document.getElementById('tomorrowPlanOutput');
    var text = output ? String(output.value || '').trim() : '';

    if (!text) {
      setStatusText_('Generate rekap dulu sebelum copy format grup');
      return;
    }

    copyTextToClipboard_(text, function() {
      setStatusText_('Format grup delivery berhasil disalin');
    }, function() {
      setStatusText_('Gagal menyalin otomatis. Silakan copy manual dari preview');
      output.focus();
      output.select();
    });
  }

  function handleSalesChange_() {
    var salesSelect = document.getElementById('sales_id');
    var selectedOption = salesSelect.options[salesSelect.selectedIndex];
    var fallbackName = appState.currentUser ? appState.currentUser.nama_user : '';
    document.getElementById('sales_nama').value = selectedOption ? (selectedOption.dataset.nama || fallbackName) : fallbackName;
  }

  function handleJenisCustomerChange_() {
    var jenisCustomer = getJenisCustomer_();
    var isLama = jenisCustomer === 'Lama';

    document.getElementById('customerLamaSection').classList.toggle('hidden', !isLama);
    document.getElementById('customerBaruSection').classList.toggle('hidden', isLama);
    updateSalesNewCustomerRequirements_(!isLama);

    if (isLama) {
      handleCustomerChange_();
    } else {
      clearCustomerInfo_();
      setFieldValue_('customer_id', '');
      setFieldValue_('nama_customer_input', '');
      setFieldValue_('pic_customer', '');
      setFieldValue_('alamat_kirim', '');
      setFieldValue_('no_hp_customer', '');
      setFieldValue_('link_google_maps', '');
      setFieldValue_('latitude', '');
      setFieldValue_('longitude', '');
    }
  }

  function handleCustomerChange_() {
    var customer = getSelectedCustomer_();

    if (!customer) {
      clearCustomerInfo_();
      return;
    }

    setText_('infoStatusCustomer', customer.status_customer || '-');
    setText_('infoStatusPembayaran', customer.status_pembayaran || '-');
    setText_('infoTotalTunggakan', formatCustomerMoney_(customer.total_tunggakan));
    setText_('infoNotaOverdue', formatCustomerCount_(customer.jumlah_nota_overdue));
    setText_('infoJatuhTempo', formatCustomerDateValue_(customer.tanggal_jatuh_tempo_terdekat));
    setText_('infoAlamat', customer.alamat || '-');
    setText_('infoPic', customer.pic || '-');
    setText_('infoHp', customer.no_hp || '-');
    setText_('infoCatatanPiutang', customer.catatan_piutang || customer.catatan || '-');

    setFieldValue_('nama_customer_input', customer.nama_customer || '');
    setFieldValue_('pic_customer', customer.pic || '');
    setFieldValue_('alamat_kirim', customer.alamat || '');
    setFieldValue_('no_hp_customer', customer.no_hp || '');
    setFieldValue_('link_google_maps', customer.link_google_maps || '');
    setFieldValue_('latitude', customer.latitude || '');
    setFieldValue_('longitude', customer.longitude || '');
  }

  function handleAdminJenisCustomerChange_() {
    var jenisCustomer = getAdminJenisCustomer_();
    var isLama = jenisCustomer === 'Lama';

    document.getElementById('adminCustomerLamaSection').classList.toggle('hidden', !isLama);
    document.getElementById('adminCustomerBaruSection').classList.toggle('hidden', isLama);

    if (isLama) {
      handleAdminCustomerChange_();
    } else {
      clearAdminCustomerInfo_();
      setFieldValue_('admin_customer_id', '');
      setFieldValue_('admin_nama_customer_input', '');
      setFieldValue_('admin_pic_customer', '');
      setFieldValue_('admin_alamat_kirim', '');
      setFieldValue_('admin_no_hp_customer', '');
    }
  }

  function handleAdminCustomerChange_() {

  function collectSalesItemDraft_() {
    calculateTotals_();

    var namaItem = String(getFieldValue_('item') || '').trim();
    var qty = Number(getFieldValue_('qty') || 0);
    var harga = Number(getFieldValue_('harga') || 0);
    var diskon = Number(getFieldValue_('diskon') || 0);
    var subtotal = parseCurrencyInput_(getFieldValue_('line_subtotal'));
    var product = getProductByName_(namaItem);

    if (!namaItem) {
      return { validationMessage: 'Produk wajib dipilih sebelum menambah item.' };
    }

    if (qty <= 0) {
      return { validationMessage: 'Qty item harus lebih dari 0.' };
    }

    if (harga < 0) {
      return { validationMessage: 'Harga item tidak boleh negatif.' };
    }

    if (diskon < 0) {
      return { validationMessage: 'Diskon item tidak boleh negatif.' };
    }

    return {
      validationMessage: '',
      item: {
        kode_item: product ? product.kode_item || '' : '',
        nama_item: namaItem,
        qty: qty,
        satuan: product ? product.satuan || '' : '',
        harga: harga,
        diskon: diskon,
        subtotal: subtotal
      }
    };
  }

  function validateAgentFormPayload_(payload) {
    if (!Array.isArray(payload.items) || !payload.items.length) {
      return 'Minimal satu item order agen wajib ditambahkan.';
    }

    if (String(payload.jenis_customer || '') !== 'Baru') {
      return '';
    }

    if (!String(payload.nama_customer_input || '').trim()) {
      return 'Nama Agen / Customer wajib diisi untuk agen baru.';
    }

    if (!String(payload.pic_customer || '').trim()) {
      return 'PIC Customer wajib diisi untuk agen baru.';
    }

    if (!String(payload.alamat_kirim || '').trim()) {
      return 'Alamat Kirim wajib diisi untuk agen baru.';
    }

    if (!String(payload.no_hp_customer || '').trim()) {
      return 'No. HP Customer wajib diisi untuk agen baru.';
    }

    return '';
  }

  function validateSalesFormPayload_(payload) {
    var requiredNewCustomerFields;

    if (!Array.isArray(payload.items) || !payload.items.length) {
      return 'Minimal satu item order wajib ditambahkan.';
    }

    if (String(payload.jenis_customer || '') !== 'Baru') {
      return '';
    }

    requiredNewCustomerFields = [
      { key: 'nama_customer_input', label: 'Nama Customer' },
      { key: 'pic_customer', label: 'PIC Customer' },
      { key: 'alamat_kirim', label: 'Alamat Kirim' },
      { key: 'no_hp_customer', label: 'No. HP Customer' },
      { key: 'link_google_maps', label: 'Link Google Maps' }
    ];

    for (var i = 0; i < requiredNewCustomerFields.length; i += 1) {
      if (!String(payload[requiredNewCustomerFields[i].key] || '').trim()) {
        return requiredNewCustomerFields[i].label + ' wajib diisi untuk customer baru.';
      }
    }

    return '';
  }

  function renderSubmitResult_(result) {
    var isWarning = result.butuh_persetujuan === 'Ya';
    var lines = [
      'No. SO: ' + result.no_so,
      'ID Customer: ' + (result.customer_id || '-'),
      'Jumlah Item: ' + String(result.jumlah_item || 0),
      'Status Order: ' + result.status_order,
      'Butuh Persetujuan: ' + result.butuh_persetujuan
    ];

    if (result.alasan_hold) {
      lines.push('Alasan Hold: ' + result.alasan_hold);
    }

    renderResult_(lines.join('\n'), isWarning);
  }

  function buildOrderDetailPreviewHtml_(details) {
    var safeDetails = Array.isArray(details) ? details : [];

    if (!safeDetails.length) {
      return '';
    }

    return '<div class="order-item-preview">' + safeDetails.map(function(detail) {
      var qtyLabel = formatNumber_(detail.qty || 0);
      return '<div class="order-item-line">' +
        '<span>' + escapeHtml_(detail.nama_item || '-') + '</span>' +
        '<small>' + escapeHtml_(qtyLabel + (detail.satuan ? ' ' + detail.satuan : '')) + '</small>' +
      '</div>';
    }).join('') + '</div>';

  function extractAreaLabel_(alamat) {
    var text = String(alamat || '').trim();
    var keywordMatch;

    if (!text) {
      return '-';
    }

    if (text.indexOf(',') !== -1) {
      var parts = text.split(',').map(function(part) {
        return String(part || '').trim();
      }).filter(Boolean);

      if (parts.length > 1) {
        return parts[parts.length - 1];
      }
    }

    keywordMatch = text.match(/(serang baru|cikarang|bekasi|karawang|tangerang|bogor|depok|bandung|jakarta|serang)/i);
    if (keywordMatch) {
      return toTitleCaseWords_(keywordMatch[0]);
    }

    return text;
  }

  function toTitleCaseWords_(text) {
    return String(text || '').replace(/\b\w+/g, function(part) {
      return part.charAt(0).toUpperCase() + part.slice(1).toLowerCase();
    });
  }

  function normalizeClientText_(value) {
    return String(value || '').trim().toLowerCase();
  }

  function escapeHtml_(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escapeJs_(value) {
    return String(value || '')
      .replace(/\\/g, '\\\\')
      .replace(/'/g, "\\'");
  }

  function formatNumber_(value) {
    var number = Number(value || 0);
    return number.toLocaleString('id-ID');
  }

  function formatCurrencyInput_(value) {
    return 'Rp ' + formatNumber_(value || 0);
  }

  function parseCurrencyInput_(value) {
    var normalized = String(value || '').replace(/[^0-9-]/g, '');
    return Number(normalized || 0);
  }

  function formatCustomerMoney_(value) {
    return Number(value || 0) > 0 ? formatNumber_(value) : '-';
  }

  function formatCustomerCount_(value) {
    return Number(value || 0) > 0 ? String(value) : '-';
  }

  function formatCustomerDateValue_(value) {

  }

  function buildApprovalRiskSummary_(row) {
    var lines = [];
    var totalTunggakan = Number(row.total_tunggakan || 0);
    var jumlahNota = Number(row.jumlah_nota_overdue || 0);
    var jatuhTempo = String(row.tanggal_jatuh_tempo_terdekat || '').trim();
    var catatan = String(row.catatan_piutang || '').trim();

    if (totalTunggakan > 0) {
      lines.push('<div class="risk-line"><strong>Total:</strong> Rp ' + escapeHtml_(formatNumber_(totalTunggakan)) + '</div>');
    }

    if (jumlahNota > 0) {
      lines.push('<div class="risk-line"><strong>Overdue:</strong> ' + escapeHtml_(String(jumlahNota)) + ' nota</div>');
    }

    if (jatuhTempo) {
      lines.push('<div class="risk-line"><strong>JT:</strong> ' + escapeHtml_(jatuhTempo) + '</div>');
    }

    if (catatan) {
      lines.push('<div class="risk-line"><strong>Catatan:</strong> ' + escapeHtml_(catatan) + '</div>');
    }

    if (!lines.length) {
      return '<span>-</span>';
    }

    return '<div class="risk-summary">' + lines.join('') + '</div>';
  }

  function buildStatusBadge_(status) {

    var normalized = text.toLowerCase();
    var className = 'ready';

    if (normalized === 'menunggu persetujuan') {

    } else if (normalized === 'ditahan' || normalized === 'ditolak') {

  function buildTomorrowPlanMessage_() {
    var orders = appState.tomorrowOrders || [];
    var planDateLabel = formatLongDateId_(appState.tomorrowPlanDate);
    var rekapBarang = buildTomorrowItemSummary_(orders);
    var outletCount = countTomorrowOutlets_(orders);

    if (!orders.length) {
      return 'Rencana kirim besok, ' + planDateLabel + '\nBelum ada data rencana kirim untuk besok.';
    }

    return [

      'Total outlet: ' + outletCount,
      'Total order: ' + orders.length,
      '',
      'Rekap barang:',
      rekapBarang.join('\n'),
      '',
      'Detail outlet:',
      buildTomorrowOutletLines_(orders).join('\n')
    ].join('\n');
  }

  function buildTomorrowItemSummary_(orders) {
    var grouped = {};

    (orders || []).forEach(function(row) {
      getOrderDetails_(row).forEach(function(detail) {
        var key = String(detail.nama_item || '').trim();
        var unit = String(detail.satuan || getProductUnitByName_(detail.nama_item)).trim();

        if (!key) {
          return;
        }

        if (!grouped[key]) {
          grouped[key] = {
            qty: 0,
            unit: unit
          };
        }

        grouped[key].qty += Number(detail.qty || 0);
      });
    });

    return Object.keys(grouped).map(function(itemName) {
      var item = grouped[itemName];
      var qtyLabel = formatNumber_(item.qty);
      return '- ' + itemName + ': ' + qtyLabel + (item.unit ? ' ' + item.unit : '');
    });
  }

  function buildTomorrowOutletLines_(orders) {
    return (orders || []).map(function(row, index) {
      return [
        (index + 1) + '. ' + String(row.nama_customer_input || '-').trim(),
        getOrderItemLabel_(row),
        getOrderQtyLabel_(row),
        extractAreaLabel_(row.alamat_kirim),
        'status ' + getTomorrowDisplayStatus_(row)
      ].join(', ');
    });
  }

  function countTomorrowOutlets_(orders) {
    var outletMap = {};

    (orders || []).forEach(function(row) {
      outletMap[getTomorrowOutletKey_(row)] = true;
    });

    return countNonEmptyKeys_(outletMap);
  }

  function formatLongDateId_(value) {
    var normalizedValue = normalizeDateKey_(value);
    var parts = normalizedValue.split('-');
    var monthNames = [
      'Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
      'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'
    ];
    var year = Number(parts[0] || 0);
    var monthIndex = Number(parts[1] || 0) - 1;
    var day = Number(parts[2] || 0);

    if (!year || monthIndex < 0 || monthIndex > 11 || !day) {
      return String(value || '-');
    }

    return day + ' ' + monthNames[monthIndex] + ' ' + year;
  }

  function formatShortDateId_(value) {
    var normalizedValue = normalizeDateKey_(value);
    var parts = normalizedValue.split('-');
    var monthNames = [
      'Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun',
      'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'
    ];
    var year = Number(parts[0] || 0);
    var monthIndex = Number(parts[1] || 0) - 1;
    var day = Number(parts[2] || 0);

    if (!year || monthIndex < 0 || monthIndex > 11 || !day) {
      return String(value || '-');
    }

    return String(day).padStart(2, '0') + ' ' + monthNames[monthIndex] + ' ' + year;
  }

  function normalizeDateKey_(value) {
    var match = String(value || '').trim().match(/^(\d{4})-(\d{2})-(\d{2})/);

    if (!match) {
      return '';
    }

    return [match[1], match[2], match[3]].join('-');
  }

  function getTodayIsoDate_() {
    var today = new Date();

    return [
      today.getFullYear(),
      String(today.getMonth() + 1).padStart(2, '0'),
      String(today.getDate()).padStart(2, '0')
    ].join('-');
  }

  function copyTextToClipboard_(text, onSuccess, onFailure) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(onSuccess).catch(onFailure);
      return;
    }

    var tempArea = document.createElement('textarea');
    tempArea.value = text;
    tempArea.setAttribute('readonly', 'readonly');
    tempArea.style.position = 'fixed';
    tempArea.style.top = '-9999px';
    document.body.appendChild(tempArea);
    tempArea.focus();
    tempArea.select();

    try {
      document.execCommand('copy');
      document.body.removeChild(tempArea);
      onSuccess();
    } catch (error) {
      document.body.removeChild(tempArea);
      onFailure(error);
    }
  }

          '.address-box,.note-box{border:1px solid #222;padding:1.2mm;white-space:pre-line;font-size:8.4px;line-height:1.12;}' +
          '.address-box{min-height:8mm;}' +
          '.note-box{min-height:9mm;}' +
          '.section-title{font-weight:bold;margin:0 0 .8mm;font-size:8.8px;}' +
          'table{width:100%;border-collapse:collapse;margin-top:.8mm;table-layout:fixed;}' +
          'th,td{border:1px solid #222;padding:.9mm 1.1mm;font-size:8.3px;text-align:left;vertical-align:top;line-height:1.08;}' +
          'th{text-transform:uppercase;font-size:7.6px;letter-spacing:.15px;}' +
          '.section-gap{margin-top:1.2mm;}' +
          '.sign-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:3mm;margin-top:1.6mm;}' +
          '.sign-box{text-align:center;min-height:13mm;display:flex;flex-direction:column;justify-content:flex-end;}' +
          '.sign-line{border-top:1px solid #222;padding-top:.8mm;font-size:7.8px;}' +
          '.tear-line{border-top:2px dashed #666;padding-top:1mm;text-align:center;font-size:7.6px;letter-spacing:.35px;}' +
          '.nota-grid{display:grid;grid-template-columns:1.18fr .82fr;gap:3mm;align-items:stretch;}' +
          '.summary-box{border:1px solid #222;padding:1.2mm;display:grid;gap:.7mm;align-content:start;}' +
          '.summary-row{display:grid;grid-template-columns:1fr auto;gap:2mm;font-size:8.4px;}' +
          '.summary-row strong{font-size:8.8px;}' +
          '.terbilang-box{border:1px solid #222;padding:1.2mm;min-height:12mm;font-size:8.4px;line-height:1.12;}' +
          '.nota-note-list{margin:0;padding-left:3mm;display:grid;gap:.6mm;font-size:8.4px;line-height:1.12;}' +
          '@page{size:' + escapeHtml_(String(printConfig.PAPER_WIDTH_MM || 210)) + 'mm ' + escapeHtml_(String(printConfig.PAPER_HEIGHT_MM || 297)) + 'mm;margin:2mm;}' +
          '@media print{body{background:#fff}.print-wrap{width:auto;margin:0;padding:0}.sheet-block{page-break-inside:avoid}button{display:none}}' +
        '</style>' +
      '</head>' +
      '<body onload="window.print()">' +
        '<div class="print-wrap">' +
          printBodyHtml +
        '</div>' +
      '</body>' +
      '</html>';
  }

  function buildCombinedPrintSheet_(data) {
    return '' +
      '<section class="sheet-block">' +
        buildSuratJalanSection_(data) +
        '<div class="tear-line">---------------- GARIS POTONG / PERFORASI ----------------</div>' +
        buildNotaSection_(data) +
      '</section>';
  }

  function buildSuratJalanSection_(data) {
    var detailRows = buildPrintSuratJalanRows_(data.items);

    return '' +
      '<section class="doc-section">' +
        '<div class="copy-header">' +
          '<div class="brand">' +
            '<img class="brand-logo" src="' + escapeHtml_(window.APP_BOOTSTRAP.brandLogoDataUrl || '') + '" alt="ATS" />' +
            '<div>' +
              '<div class="brand-title">PT ABUYAMAS TIRTA SEJAHTERA</div>' +
              '<p class="brand-subtitle">Jl. Kapling Blok EO No.31 RT.01 RW.09, Cijujung, Sukaraja, Bogor, Jawa Barat 16710</p>' +
              '<p class="brand-subtitle">Telp: 081217002021 | Email: airtismarketingats@gmail.com</p>' +
            '</div>' +
          '</div>' +
          '<div class="doc-title">' +
            '<strong>SURAT JALAN</strong>' +
            '<strong>' + escapeHtml_(data.no_surat_jalan || '-') + '</strong>' +
          '</div>' +
        '</div>' +
        '<div class="doc-content">' +
          '<div class="meta-grid">' +
            buildPrintMetaItem_('Tanggal', formatPrintDate_(data.tanggal_kirim || data.tanggal_cetak || '')) +
            buildPrintMetaItem_('No. SJ', data.no_surat_jalan) +
            buildPrintMetaItem_('No SO', data.no_so) +
            buildPrintMetaItem_('No. Nota', data.no_so) +
            buildPrintMetaItem_('Customer', data.nama_customer) +
            buildPrintMetaItem_('PIC / HP', joinPrintValues_(data.pic_customer, data.no_hp_customer, ' / ')) +
            '<div class="full-row">' +
              '<div class="section-title">Alamat</div>' +
              '<div class="address-box">' + escapeHtml_(data.alamat_kirim || '-') + '</div>' +
            '</div>' +
          '</div>' +
          '<div>' +
            '<div class="section-title">Detail Barang</div>' +
            '<table>' +
              '<thead>' +
                '<tr>' +
                  '<th style="width:14mm;">No</th>' +
                  '<th>Deskripsi Barang</th>' +
                  '<th style="width:18mm;">Qty</th>' +
                  '<th style="width:16mm;">Sat</th>' +
                  '<th style="width:30mm;">Ket.</th>' +
                '</tr>' +
              '</thead>' +
              '<tbody>' + detailRows + '</tbody>' +
            '</table>' +
          '</div>' +
        '</div>' +
        '<div class="doc-footer">' +
          '<div>' +
            '<div class="section-title">Catatan</div>' +
            '<div class="note-box">' + escapeHtml_(buildSuratJalanNotes_(data) || '-') + '</div>' +
          '</div>' +
          '<div class="sign-grid">' +
            buildPrintSignBox_('Penerima') +
            buildPrintSignBox_('Gudang') +
            buildPrintSignBox_('Admin') +
            buildPrintSignBox_('Security') +
          '</div>' +
        '</div>' +
      '</section>';
  }

  function buildNotaSection_(data) {
    var detailRows = buildPrintNotaRows_(data.items);
    var subtotal = getPrintSubtotal_(data);
    var diskon = getPrintDiskon_(data);
    var total = Number(data.total || 0);

    return '' +
      '<section class="doc-section last">' +
        '<div class="copy-header">' +
          '<div class="brand">' +
            '<img class="brand-logo" src="' + escapeHtml_(window.APP_BOOTSTRAP.brandLogoDataUrl || '') + '" alt="ATS" />' +
            '<div>' +
              '<div class="brand-title">PT ABUYAMAS TIRTA SEJAHTERA</div>' +
              '<p class="brand-subtitle">Jl. Kapling Blok EO No.31 RT.01 RW.09, Cijujung, Sukaraja, Bogor, Jawa Barat 16710</p>' +
              '<p class="brand-subtitle">Telp: 081217002021 | Email: airtismarketingats@gmail.com</p>' +
            '</div>' +
          '</div>' +
          '<div class="doc-title">' +
            '<strong>NOTA</strong>' +
            '<strong>' + escapeHtml_(data.no_so || '-') + '</strong>' +
          '</div>' +
        '</div>' +
        '<div class="doc-content">' +
          '<div class="meta-grid">' +
            buildPrintMetaItem_('Tanggal', formatPrintDate_(data.tanggal_kirim || data.tanggal_cetak || '')) +
            buildPrintMetaItem_('No. SJ', data.no_surat_jalan) +
            buildPrintMetaItem_('No. Nota', data.no_so) +
            buildPrintMetaItem_('Term Bayar', data.term_pembayaran) +
            buildPrintMetaItem_('Customer', data.nama_customer) +
            buildPrintMetaItem_('Sales', data.sales_nama) +
            '<div class="full-row">' +
              '<div class="section-title">Alamat</div>' +
              '<div class="address-box">' + escapeHtml_(data.alamat_kirim || '-') + '</div>' +
            '</div>' +
          '</div>' +
          '<div>' +
            '<table>' +
              '<thead>' +
                '<tr>' +
                  '<th style="width:12mm;">No</th>' +
                  '<th>Barang</th>' +
                  '<th style="width:16mm;">Qty</th>' +
                  '<th style="width:14mm;">Sat</th>' +
                  '<th style="width:24mm;">Harga</th>' +
                  '<th style="width:20mm;">Diskon</th>' +
                  '<th style="width:28mm;">Jumlah</th>' +
                '</tr>' +
              '</thead>' +
              '<tbody>' + detailRows + '</tbody>' +
            '</table>' +
          '</div>' +
        '</div>' +
        '<div class="doc-footer">' +
          '<div class="nota-grid">' +
            '<div>' +
              '<div class="section-title">Catatan Nota</div>' +
              '<div class="note-box">' +
                '<ul class="nota-note-list">' +
                  '<li>Periksa barang saat diterima.</li>' +
                  '<li>Pembayaran mengikuti term: ' + escapeHtml_(data.term_pembayaran || '-') + '.</li>' +
                  '<li>Catatan order: ' + escapeHtml_(joinPrintValues_(data.catatan_order, data.catatan_kirim, ' | ') || '-') + '</li>' +
                '</ul>' +
              '</div>' +
              '<div class="section-title section-gap">Terbilang</div>' +
              '<div class="terbilang-box">' + escapeHtml_(buildTerbilangRupiah_(total)) + '</div>' +
            '</div>' +
            '<div class="summary-box">' +
              buildPrintSummaryRow_('Subtotal', subtotal) +
              buildPrintSummaryRow_('Diskon', diskon) +
              buildPrintSummaryRow_('Grand Total', total, true) +
            '</div>' +
          '</div>' +
          '<div class="sign-grid">' +
            buildPrintSignBox_('Dibuat') +
            buildPrintSignBox_('Disetujui') +
            buildPrintSignBox_('Pelanggan') +
            buildPrintSignBox_('Stempel / Paraf') +
          '</div>' +
        '</div>' +
      '</section>';
  }

  function buildPrintSuratJalanRows_(items) {
    var details = getPrintableItems_(items);
    var rowsHtml = details.map(function(item, index) {
      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(String(index + 1)) + '</td>' +
          '<td>' + escapeHtml_(item.nama_item || '-') + '</td>' +
          '<td>' + escapeHtml_(formatNumber_(item.qty || 0)) + '</td>' +
          '<td>' + escapeHtml_(item.satuan || '-') + '</td>' +
          '<td></td>' +
        '</tr>';
    }).join('');

    while (details.length < 3) {
      rowsHtml += '<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>';
      details.push({});
    }

    return rowsHtml;
  }

  function buildPrintNotaRows_(items) {
    var details = getPrintableItems_(items);
    var rowsHtml = details.map(function(item, index) {
      return '' +
        '<tr>' +
          '<td>' + escapeHtml_(String(index + 1)) + '</td>' +
          '<td>' + escapeHtml_(item.nama_item || '-') + '</td>' +
          '<td>' + escapeHtml_(formatNumber_(item.qty || 0)) + '</td>' +
          '<td>' + escapeHtml_(item.satuan || '-') + '</td>' +
          '<td>' + escapeHtml_(formatCurrencyInput_(item.harga || 0)) + '</td>' +
          '<td>' + escapeHtml_(formatCurrencyInput_(item.diskon || 0)) + '</td>' +
          '<td>' + escapeHtml_(formatCurrencyInput_(item.subtotal || 0)) + '</td>' +
        '</tr>';
    }).join('');

    while (details.length < 2) {
      rowsHtml += '<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td></tr>';
      details.push({});
    }

    return rowsHtml;
  }

  function buildPrintMetaItem_(label, value) {
    return '' +
      '<div class="meta-item">' +
        '<div>' + escapeHtml_(label) + '</div>' +
        '<div>: ' + escapeHtml_(value || '-') + '</div>' +
      '</div>';
  }

  function buildPrintSignBox_(label) {
    return '' +
      '<div class="sign-box">' +
        '<div class="sign-line">' + escapeHtml_(label) + '</div>' +
      '</div>';
  }

  function buildPrintSummaryRow_(label, value, isStrong) {
    return '' +
      '<div class="summary-row">' +
        '<span>' + (isStrong ? '<strong>' + escapeHtml_(label) + '</strong>' : escapeHtml_(label)) + '</span>' +
        '<span>' + (isStrong ? '<strong>' + escapeHtml_(formatCurrencyInput_(value || 0)) + '</strong>' : escapeHtml_(formatCurrencyInput_(value || 0))) + '</span>' +
      '</div>';
  }

  function getPrintableItems_(items) {
    return Array.isArray(items) && items.length ? items.slice() : [{
      nama_item: '',
      qty: '',
      satuan: '',
      harga: 0,
      diskon: 0,
      subtotal: 0
    }];
  }

  function getPrintSubtotal_(data) {
    if (Number(data.subtotal || 0) > 0) {
      return Number(data.subtotal || 0);
    }

    return getPrintableItems_(data.items).reduce(function(result, item) {
      return result + (Number(item.qty || 0) * Number(item.harga || 0));
    }, 0);
  }

  function getPrintDiskon_(data) {
    if (Number(data.diskon || 0) > 0) {
      return Number(data.diskon || 0);
    }

    return getPrintableItems_(data.items).reduce(function(result, item) {
      return result + Number(item.diskon || 0);
    }, 0);
  }

  function buildSuratJalanNotes_(data) {
    var notes = [];
    var picHp = joinPrintValues_(data.pic_customer, data.no_hp_customer, ' / ');

    if (picHp) {
      notes.push('PIC / HP: ' + picHp);
    }

    if (data.catatan_order) {
      notes.push('Order: ' + data.catatan_order);
    }

    if (data.catatan_kirim) {
      notes.push('Kirim: ' + data.catatan_kirim);
    }

    return notes.join('\n');
  }

  function formatPrintDate_(value) {
    var text = String(value || '').trim();
    var match = text.match(/^(\d{4})-(\d{2})-(\d{2})/);

    if (!match) {
      return text || '-';
    }

    return match[3] + '/' + match[2] + '/' + match[1];
  }

  function buildTerbilangRupiah_(value) {
    var amount = Math.floor(Number(value || 0));

    if (amount <= 0) {
      return 'Nol rupiah';
    }

    return toTitleCaseWords_(numberToBahasaWords_(amount).trim()) + ' rupiah';
  }

  function numberToBahasaWords_(value) {
    var angka = ['', 'satu', 'dua', 'tiga', 'empat', 'lima', 'enam', 'tujuh', 'delapan', 'sembilan', 'sepuluh', 'sebelas'];

    value = Math.floor(Number(value || 0));

    if (value < 12) {
      return angka[value];
    }

    if (value < 20) {
      return numberToBahasaWords_(value - 10) + ' belas';
    }

    if (value < 100) {
      return numberToBahasaWords_(Math.floor(value / 10)) + ' puluh ' + numberToBahasaWords_(value % 10);
    }

    if (value < 200) {
      return 'seratus ' + numberToBahasaWords_(value - 100);
    }

    if (value < 1000) {
      return numberToBahasaWords_(Math.floor(value / 100)) + ' ratus ' + numberToBahasaWords_(value % 100);
    }

    if (value < 2000) {
      return 'seribu ' + numberToBahasaWords_(value - 1000);
    }

    if (value < 1000000) {
      return numberToBahasaWords_(Math.floor(value / 1000)) + ' ribu ' + numberToBahasaWords_(value % 1000);
    }

    if (value < 1000000000) {
      return numberToBahasaWords_(Math.floor(value / 1000000)) + ' juta ' + numberToBahasaWords_(value % 1000000);
    }

    return String(value);
  }

  function joinPrintValues_(firstValue, secondValue, separator) {
    var values = [firstValue, secondValue].filter(function(value) {
      return String(value || '').trim() !== '';
    });

    return values.join(separator || ' ');
  }
</script>
